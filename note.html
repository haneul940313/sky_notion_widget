<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clonote</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper-bg: #fbfbf8;
      --line-color: rgba(132, 184, 196, 0.48);
      --margin-line: rgba(208, 112, 112, 0.45);
      --text: #2f2f2f;
      --muted: #7a7a7a;
      --sat: #5d86c8;
      --sun: #d06f6f;
      --glass: rgba(255, 255, 255, 0.78);
      --glass-strong: rgba(255, 255, 255, 0.95);
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.06);

      --row-h: 24px;
      --date-col: 56px;
      --save-col: 28px;
      --margin-x: 64px;
      --line-offset: 0px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    body {
      width: 100%;
    }

    .widget {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 12px 8px;
      border-radius: 18px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: var(--shadow);
      background: var(--paper-bg);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      padding-bottom: 6px;
      background: rgba(255, 255, 255, 0.35);
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .month-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #3f3f3f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }

    .icon-btn,
    .text-btn,
    .menu-btn {
      border: 1px solid rgba(0, 0, 0, 0.07);
      background: var(--glass-strong);
      color: #222;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }

    .text-btn {
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .menu-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .icon-btn:hover,
    .text-btn:hover,
    .menu-btn:hover {
      transform: translateY(-1px);
      background: #fff;
    }

    .login-box {
      display: none;
      margin-bottom: 6px;
      padding: 10px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(4px);
    }

    .login-box.show {
      display: block;
    }

    .guide {
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .login-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .input {
      width: 100%;
      height: 32px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
    }

    .input:focus {
      border-color: rgba(0, 0, 0, 0.18);
    }

    .status {
      min-height: 16px;
      margin: 4px 2px 0;
      font-size: 11px;
      color: #666;
    }

    .sheet {
      border-radius: 10px;
      background:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) + 1px),
          transparent calc(var(--margin-x) + 1px),
          transparent 100%
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px + var(--line-offset)),
          var(--line-color) calc(var(--row-h) - 1px + var(--line-offset)),
          var(--line-color) calc(var(--row-h) + var(--line-offset))
        );
    }

    .row {
      display: grid;
      grid-template-columns: var(--date-col) 1fr var(--save-col);
      align-items: center;
      height: var(--row-h);
      min-height: var(--row-h);
      max-height: var(--row-h);
    }

    .day-cell,
    .memo-cell,
    .save-cell {
      height: var(--row-h);
      display: flex;
      align-items: center;
    }

    .day-cell {
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #666;
      white-space: nowrap;
      line-height: 1;
    }

    .day-cell.sat { color: var(--sat); }
    .day-cell.sun { color: var(--sun); }

    .memo-cell {
      padding: 0 6px 0 8px;
    }

    .memo-input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 0;
      font-size: 12px;
      color: var(--text);
      line-height: 1;
    }

    .memo-input:disabled {
      color: rgba(0, 0, 0, 0.45);
      cursor: default;
    }

    .save-cell {
      justify-content: center;
    }

    .save-btn {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #8a8a8a;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .save-btn:hover { color: #111; }
    .save-btn.saved { color: #111; font-weight: 700; }
    .save-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .menu-wrap {
      position: relative;
      display: none;
    }

    .menu-wrap.show {
      display: block;
    }

    .menu-pop {
      display: none;
      position: absolute;
      top: 34px;
      right: 0;
      min-width: 88px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 6px;
      z-index: 20;
    }

    .menu-pop.show {
      display: block;
    }

    .menu-item {
      width: 100%;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 8px;
      text-align: left;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .menu-item:hover {
      background: #f5f5f5;
    }

    .footer {
      margin-top: 4px;
      padding-top: 4px;
      font-size: 10px;
      color: #7c7c7c;
      text-align: right;
    }

    @media (max-width: 640px) {
      :root {
        --row-h: 22px;
        --date-col: 52px;
        --save-col: 26px;
        --margin-x: 60px;
      }

      .widget {
        padding: 8px 10px 8px;
        border-radius: 14px;
      }

      .month-title { font-size: 16px; }
      .user-name { max-width: 110px; font-size: 12px; }

      .login-row {
        flex-direction: column;
        align-items: stretch;
      }

      .login-row .text-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="header-left">
        <button class="icon-btn" id="prevBtn" type="button">‹</button>
        <div class="month-title" id="monthTitle">2026년 3월</div>
        <button class="icon-btn" id="nextBtn" type="button">›</button>
      </div>

      <div class="header-right">
        <div class="user-name" id="userNameText">사용자</div>
        <div class="menu-wrap" id="menuWrap">
          <button class="menu-btn" id="menuBtn" type="button">⋯</button>
          <div class="menu-pop" id="menuPop">
            <button class="menu-item" id="logoutBtn" type="button">로그아웃</button>
          </div>
        </div>
      </div>
    </div>

    <div class="login-box" id="loginBox">
      <div class="guide">최초 1회만 입력하면 자동 로그인됩니다.</div>
      <div class="login-row">
        <input class="input" id="loginNameInput" type="text" placeholder="사용자 이름" maxlength="30" />
        <input class="input" id="loginPasswordInput" type="password" placeholder="비밀번호" maxlength="30" />
        <button class="text-btn" id="startBtn" type="button">시작하기</button>
      </div>
      <div class="status" id="loginStatus"></div>
    </div>

    <div class="sheet" id="sheet"></div>
    <div class="status" id="statusText"></div>
    <div class="footer">© Clonote</div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwHN2xQr85KT3AWgJu388sRzEjYukyo7vb-vyNqre2j0UuJ0FXGAcn1FpBVX2SvzxBQwg/exec';
    const STORAGE_KEY = 'clonote_login_token';

    const monthTitle = document.getElementById('monthTitle');
    const userNameText = document.getElementById('userNameText');
    const loginBox = document.getElementById('loginBox');
    const loginNameInput = document.getElementById('loginNameInput');
    const loginPasswordInput = document.getElementById('loginPasswordInput');
    const startBtn = document.getElementById('startBtn');
    const loginStatus = document.getElementById('loginStatus');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const sheetEl = document.getElementById('sheet');
    const statusText = document.getElementById('statusText');
    const menuWrap = document.getElementById('menuWrap');
    const menuBtn = document.getElementById('menuBtn');
    const menuPop = document.getElementById('menuPop');
    const logoutBtn = document.getElementById('logoutBtn');

    let currentDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let currentUser = null;
    let currentToken = localStorage.getItem(STORAGE_KEY) || '';
    let currentRecordsMap = {};

    function setStatus(message, isError = false) {
      statusText.textContent = message || '';
      statusText.style.color = isError ? '#c0392b' : '#666';
    }

    function setLoginStatus(message, isError = false) {
      loginStatus.textContent = message || '';
      loginStatus.style.color = isError ? '#c0392b' : '#666';
    }

    function getYear() {
      return currentDate.getFullYear();
    }

    function getMonth() {
      return currentDate.getMonth() + 1;
    }

    function getLastDayOfMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function formatMonthTitle(year, month) {
      return `${year}년 ${month}월`;
    }

    function getWeekday(year, month, day) {
      return new Date(year, month - 1, day).getDay();
    }

    function getDayClass(year, month, day) {
      const weekday = getWeekday(year, month, day);
      if (weekday === 6) return 'sat';
      if (weekday === 0) return 'sun';
      return '';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderHeader() {
      monthTitle.textContent = formatMonthTitle(getYear(), getMonth());
      userNameText.textContent = currentUser?.userName || '사용자';
    }

    function renderLoginBox() {
      loginBox.classList.toggle('show', !currentUser);
      menuWrap.classList.toggle('show', !!currentUser);
      if (!currentUser) {
        menuPop.classList.remove('show');
      }
    }

    function buildRecordsMap(records) {
      const map = {};
      (records || []).forEach(item => {
        map[Number(item.day)] = item;
      });
      currentRecordsMap = map;
    }

    function renderSheet() {
      const year = getYear();
      const month = getMonth();
      const lastDay = getLastDayOfMonth(year, month);

      let html = '';
      for (let day = 1; day <= lastDay; day++) {
        const record = currentRecordsMap[day];
        const memo = record?.memo || '';
        const dayClass = getDayClass(year, month, day);

        html += `
          <div class="row">
            <div class="day-cell ${dayClass}">${day}일</div>
            <div class="memo-cell">
              <input
                class="memo-input"
                type="text"
                data-day="${day}"
                value="${escapeHtml(memo)}"
                placeholder=""
                ${currentUser ? '' : 'disabled'}
              />
            </div>
            <div class="save-cell">
              <button class="save-btn" type="button" data-save-day="${day}" ${currentUser ? '' : 'disabled'}>✓</button>
            </div>
          </div>
        `;
      }

      sheetEl.innerHTML = html;

      sheetEl.querySelectorAll('.save-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const day = Number(btn.dataset.saveDay);
          saveDayRecord(day);
        });
      });

      sheetEl.querySelectorAll('.memo-input').forEach((input) => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            saveDayRecord(Number(input.dataset.day));
          }
        });

        input.addEventListener('blur', () => {
          const day = Number(input.dataset.day);
          const origin = currentRecordsMap[day]?.memo || '';
          if (input.value !== origin) {
            saveDayRecord(day, true);
          }
        });
      });
    }

    function getInputByDay(day) {
      return sheetEl.querySelector(`.memo-input[data-day="${day}"]`);
    }

    function getSaveBtnByDay(day) {
      return sheetEl.querySelector(`.save-btn[data-save-day="${day}"]`);
    }

    async function getJson(url) {
      const response = await fetch(url);
      return response.json();
    }

    async function postJson(body) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
      return response.json();
    }

    async function tryAutoLogin() {
      if (!currentToken) {
        currentUser = null;
        renderHeader();
        renderLoginBox();
        return false;
      }

      try {
        const result = await getJson(`${API_URL}?action=autoLogin&token=${encodeURIComponent(currentToken)}`);

        if (result.success && result.user) {
          currentUser = result.user;
          renderHeader();
          renderLoginBox();
          return true;
        }

        localStorage.removeItem(STORAGE_KEY);
        currentToken = '';
        currentUser = null;
        renderHeader();
        renderLoginBox();
        return false;
      } catch (error) {
        currentUser = null;
        renderHeader();
        renderLoginBox();
        setStatus('자동 로그인에 실패했습니다.', true);
        return false;
      }
    }

    async function start() {
      const userName = loginNameInput.value.trim();
      const password = loginPasswordInput.value.trim();

      if (!userName || !password) {
        setLoginStatus('이름과 비밀번호를 입력해 주세요.', true);
        return;
      }

      startBtn.disabled = true;
      setLoginStatus('확인 중입니다...');

      try {
        await postJson({
          action: 'registerUser',
          userName,
          password
        });

        const loginResult = await postJson({
          action: 'login',
          userName,
          password
        });

        if (!loginResult.success || !loginResult.token || !loginResult.user) {
          throw new Error(loginResult.message || '로그인에 실패했습니다.');
        }

        currentToken = loginResult.token;
        currentUser = loginResult.user;
        localStorage.setItem(STORAGE_KEY, currentToken);

        loginNameInput.value = '';
        loginPasswordInput.value = '';
        setLoginStatus('');
        renderHeader();
        renderLoginBox();
        await loadRecords();
      } catch (error) {
        setLoginStatus(error.message || '시작에 실패했습니다.', true);
      } finally {
        startBtn.disabled = false;
      }
    }

    async function logout() {
      try {
        if (currentToken) {
          await postJson({
            action: 'logout',
            token: currentToken
          });
        }
      } catch (error) {
      }

      localStorage.removeItem(STORAGE_KEY);
      currentToken = '';
      currentUser = null;
      buildRecordsMap([]);
      renderHeader();
      renderLoginBox();
      renderSheet();
      setStatus('로그아웃되었습니다.');
    }

    async function loadRecords() {
      renderHeader();
      buildRecordsMap([]);
      renderSheet();

      if (!currentUser || !currentUser.userId) return;

      setStatus('불러오는 중입니다...');

      try {
        const url = `${API_URL}?action=getRecords&userId=${encodeURIComponent(currentUser.userId)}&year=${getYear()}&month=${getMonth()}`;
        const result = await getJson(url);

        if (!result.success) {
          throw new Error(result.message || '기록을 불러오지 못했습니다.');
        }

        buildRecordsMap(result.records || []);
        renderSheet();
        setStatus('');
      } catch (error) {
        setStatus(error.message || '기록을 불러오지 못했습니다.', true);
      }
    }

    async function saveDayRecord(day, silent = false) {
      if (!currentUser || !currentUser.userId) {
        if (!silent) setStatus('먼저 로그인해 주세요.', true);
        return;
      }

      const input = getInputByDay(day);
      const btn = getSaveBtnByDay(day);
      if (!input || !btn) return;

      const memo = input.value.trim();

      if (!memo) {
        if (!silent) setStatus('빈칸은 저장할 수 없습니다.', true);
        input.value = currentRecordsMap[day]?.memo || '';
        return;
      }

      btn.disabled = true;
      btn.textContent = '…';

      try {
        const result = await postJson({
          action: 'saveRecord',
          userId: currentUser.userId,
          year: getYear(),
          month: getMonth(),
          day,
          memo
        });

        if (!result.success) {
          throw new Error(result.message || '저장에 실패했습니다.');
        }

        currentRecordsMap[day] = result.record;
        btn.textContent = '✓';
        btn.classList.add('saved');
        setStatus(`${day}일 기록이 저장되었습니다.`);

        setTimeout(() => {
          btn.textContent = '✓';
          btn.classList.remove('saved');
        }, 700);
      } catch (error) {
        btn.textContent = '✓';
        setStatus(error.message || '저장 중 오류가 발생했습니다.', true);
      } finally {
        btn.disabled = false;
      }
    }

    function moveMonth(offset) {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      currentDate = new Date(year, month + offset, 1);
      loadRecords();
    }

    function closeMenuOutside(event) {
      if (!menuWrap.contains(event.target)) {
        menuPop.classList.remove('show');
      }
    }

    prevBtn.addEventListener('click', () => moveMonth(-1));
    nextBtn.addEventListener('click', () => moveMonth(1));
    startBtn.addEventListener('click', start);
    logoutBtn.addEventListener('click', logout);

    loginNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') start();
    });

    loginPasswordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') start();
    });

    menuBtn.addEventListener('click', () => {
      menuPop.classList.toggle('show');
    });

    document.addEventListener('click', closeMenuOutside);

    async function init() {
      renderHeader();
      renderLoginBox();
      renderSheet();

      const ok = await tryAutoLogin();
      if (ok) {
        await loadRecords();
      }
    }

    init();
  </script>
</body>
</html>
