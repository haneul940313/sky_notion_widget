<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clonote Monthly Notebook</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper-bg: #fbfbf8;
      --line-color: rgba(132, 184, 196, 0.55);
      --margin-line: rgba(208, 112, 112, 0.55);
      --text: #2f2f2f;
      --muted: #767676;
      --sat: #5d86c8;
      --sun: #d06f6f;
      --glass: rgba(255, 255, 255, 0.72);
      --glass-strong: rgba(255, 255, 255, 0.92);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.06);

      /* 공책 한 칸 높이 */
      --row-h: 36px;

      /* 글씨를 칸 중앙으로 보내기 위해 실제 컨텐츠 높이는 더 작게 */
      --content-h: 28px;

      --date-col: 78px;
      --save-col: 54px;
      --margin-x: 92px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    body {
      width: 100%;
    }

    .widget {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 14px 16px 10px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: var(--shadow);
      background:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) + 1px),
          transparent calc(var(--margin-x) + 1px),
          transparent 100%
        ),
        repeating-linear-gradient(
          to bottom,
          var(--paper-bg) 0,
          var(--paper-bg) calc(var(--row-h) - 1px),
          var(--line-color) calc(var(--row-h) + 2px),
          var(--line-color) var(--row-h)
        );
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      padding: 2px 0 10px;
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(4px);
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .month-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: #3f3f3f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .icon-btn,
    .text-btn {
      border: 1px solid rgba(0, 0, 0, 0.07);
      background: var(--glass-strong);
      color: #222;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
    }

    .text-btn {
      height: 38px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .icon-btn:hover,
    .text-btn:hover {
      transform: translateY(-1px);
      background: #fff;
    }

    .register-box {
      display: none;
      margin-bottom: 8px;
      padding: 12px;
      border-radius: 14px;
      background: var(--glass);
      border: 1px solid rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(4px);
    }

    .register-box.show {
      display: block;
    }

    .guide {
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .register-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
    }

    .input:focus {
      border-color: rgba(0, 0, 0, 0.18);
    }

    .status {
      min-height: 18px;
      margin: 8px 2px 0;
      font-size: 12px;
      color: #666;
    }

    .sheet {
      margin-top: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: var(--date-col) 1fr var(--save-col);
      align-items: center;
      height: var(--row-h);
    }

    .day-cell,
    .memo-cell,
    .save-cell {
      height: var(--row-h);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 핵심: 선 위가 아니라 칸 중앙으로 */
    .day-inner,
    .memo-input,
    .save-btn {
      height: var(--content-h);
      display: flex;
      align-items: center;
    }

    .day-cell {
      justify-content: center;
    }

    .day-inner {
      justify-content: center;
      width: 100%;
      font-size: 13px;
      font-weight: 700;
      color: #666;
      line-height: 1;
    }

    .day-inner.sat {
      color: var(--sat);
    }

    .day-inner.sun {
      color: var(--sun);
    }

    .memo-cell {
      padding: 0 10px 0 14px;
      justify-content: stretch;
    }

    .memo-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 0;
      font-size: 14px;
      line-height: 1;
      color: var(--text);
    }

    .memo-input::placeholder {
      color: rgba(0, 0, 0, 0.22);
    }

    .save-cell {
      justify-content: center;
    }

    .save-btn {
      width: 36px;
      justify-content: center;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.6);
      color: #7b7b7b;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .save-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      color: #111;
    }

    .save-btn.saved {
      color: #111;
      font-weight: 700;
    }

    .footer {
      margin-top: 6px;
      padding-top: 6px;
      font-size: 11px;
      color: #7c7c7c;
      text-align: right;
    }

    @media (max-width: 640px) {
      :root {
        --row-h: 34px;
        --content-h: 26px;
        --date-col: 68px;
        --save-col: 48px;
        --margin-x: 82px;
      }

      .widget {
        padding: 12px 12px 10px;
        border-radius: 16px;
      }

      .month-title {
        font-size: 18px;
      }

      .user-name {
        max-width: 120px;
        font-size: 13px;
      }

      .register-row {
        flex-direction: column;
        align-items: stretch;
      }

      .register-row .text-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="header-left">
        <button class="icon-btn" id="prevBtn" type="button">‹</button>
        <div class="month-title" id="monthTitle">2026년 3월</div>
        <button class="icon-btn" id="nextBtn" type="button">›</button>
      </div>
      <div class="header-right">
        <div class="user-name" id="userNameText">사용자</div>
      </div>
    </div>

    <div class="register-box" id="registerBox">
      <div class="guide">한 번 등록시 변경이 불가합니다.</div>
      <div class="register-row">
        <input class="input" id="userNameInput" type="text" placeholder="사용자 이름 입력" maxlength="30" />
        <button class="text-btn" id="registerBtn" type="button">등록</button>
      </div>
      <div class="status" id="registerStatus"></div>
    </div>

    <div class="sheet" id="sheet"></div>
    <div class="status" id="statusText"></div>
    <div class="footer">© Clonote</div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwZc2N9Remzv_NyzfIyvCpspQm8rwJ31E1vgi6ibj0liPlZCNep3aiDZVwmJpOdt2-CkA/exec';
    const STORAGE_KEY = 'clonote_monthly_user_id';

    const monthTitle = document.getElementById('monthTitle');
    const userNameText = document.getElementById('userNameText');

    const registerBox = document.getElementById('registerBox');
    const userNameInput = document.getElementById('userNameInput');
    const registerBtn = document.getElementById('registerBtn');
    const registerStatus = document.getElementById('registerStatus');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const sheetEl = document.getElementById('sheet');
    const statusText = document.getElementById('statusText');

    let currentDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let currentUser = null;
    let currentRecordsMap = {};

    function setStatus(message, isError = false) {
      statusText.textContent = message || '';
      statusText.style.color = isError ? '#c0392b' : '#666';
    }

    function setRegisterStatus(message, isError = false) {
      registerStatus.textContent = message || '';
      registerStatus.style.color = isError ? '#c0392b' : '#666';
    }

    function getYear() {
      return currentDate.getFullYear();
    }

    function getMonth() {
      return currentDate.getMonth() + 1;
    }

    function getLastDayOfMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function formatMonthTitle(year, month) {
      return `${year}년 ${month}월`;
    }

    function getWeekday(year, month, day) {
      return new Date(year, month - 1, day).getDay();
    }

    function getDayClass(year, month, day) {
      const weekday = getWeekday(year, month, day);
      if (weekday === 6) return 'sat';
      if (weekday === 0) return 'sun';
      return '';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderHeader() {
      monthTitle.textContent = formatMonthTitle(getYear(), getMonth());
      userNameText.textContent = currentUser?.userName || '사용자';
    }

    function renderRegisterBox() {
      if (currentUser && currentUser.userId) {
        registerBox.classList.remove('show');
      } else {
        registerBox.classList.add('show');
      }
    }

    function buildRecordsMap(records) {
      const map = {};
      (records || []).forEach(item => {
        map[Number(item.day)] = item;
      });
      currentRecordsMap = map;
    }

    function renderSheet() {
      const year = getYear();
      const month = getMonth();
      const lastDay = getLastDayOfMonth(year, month);

      let html = '';
      for (let day = 1; day <= lastDay; day++) {
        const record = currentRecordsMap[day];
        const memo = record?.memo || '';
        const dayClass = getDayClass(year, month, day);

        html += `
          <div class="row">
            <div class="day-cell">
              <div class="day-inner ${dayClass}">${day}일</div>
            </div>
            <div class="memo-cell">
              <input
                class="memo-input"
                type="text"
                data-day="${day}"
                value="${escapeHtml(memo)}"
                placeholder=""
              />
            </div>
            <div class="save-cell">
              <button class="save-btn" type="button" data-save-day="${day}">저장</button>
            </div>
          </div>
        `;
      }

      sheetEl.innerHTML = html;

      sheetEl.querySelectorAll('.save-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const day = Number(btn.dataset.saveDay);
          saveDayRecord(day);
        });
      });

      sheetEl.querySelectorAll('.memo-input').forEach((input) => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            saveDayRecord(Number(input.dataset.day));
          }
        });

        input.addEventListener('blur', () => {
          const day = Number(input.dataset.day);
          const origin = currentRecordsMap[day]?.memo || '';
          if (input.value !== origin) {
            saveDayRecord(day, true);
          }
        });
      });
    }

    function getInputByDay(day) {
      return sheetEl.querySelector(`.memo-input[data-day="${day}"]`);
    }

    function getSaveBtnByDay(day) {
      return sheetEl.querySelector(`.save-btn[data-save-day="${day}"]`);
    }

    async function getJson(url) {
      const response = await fetch(url);
      return response.json();
    }

    async function postJson(body) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
      return response.json();
    }

    async function initStoredUser() {
      const savedUserId = localStorage.getItem(STORAGE_KEY);

      if (!savedUserId) {
        currentUser = null;
        renderHeader();
        renderRegisterBox();
        return false;
      }

      try {
        const result = await getJson(`${API_URL}?action=init&userId=${encodeURIComponent(savedUserId)}`);

        if (result.success && result.found && result.user) {
          currentUser = result.user;
          renderHeader();
          renderRegisterBox();
          return true;
        }

        localStorage.removeItem(STORAGE_KEY);
        currentUser = null;
        renderHeader();
        renderRegisterBox();
        return false;
      } catch (error) {
        currentUser = null;
        renderHeader();
        renderRegisterBox();
        setStatus('사용자 정보를 불러오지 못했습니다.', true);
        return false;
      }
    }

    async function registerUser() {
      const userName = userNameInput.value.trim();

      if (!userName) {
        setRegisterStatus('이름을 입력해 주세요.', true);
        userNameInput.focus();
        return;
      }

      registerBtn.disabled = true;
      setRegisterStatus('등록 중입니다...');

      try {
        const result = await postJson({
          action: 'registerUser',
          userName
        });

        if (!result.success || !result.user) {
          throw new Error(result.message || '등록에 실패했습니다.');
        }

        currentUser = result.user;
        localStorage.setItem(STORAGE_KEY, currentUser.userId);
        userNameInput.value = '';
        setRegisterStatus('');
        renderHeader();
        renderRegisterBox();
        await loadRecords();
      } catch (error) {
        setRegisterStatus(error.message || '등록 중 오류가 발생했습니다.', true);
      } finally {
        registerBtn.disabled = false;
      }
    }

    async function loadRecords() {
      renderHeader();
      buildRecordsMap([]);
      renderSheet();

      if (!currentUser || !currentUser.userId) return;

      setStatus('불러오는 중입니다...');

      try {
        const url = `${API_URL}?action=getRecords&userId=${encodeURIComponent(currentUser.userId)}&year=${getYear()}&month=${getMonth()}`;
        const result = await getJson(url);

        if (!result.success) {
          throw new Error(result.message || '기록을 불러오지 못했습니다.');
        }

        buildRecordsMap(result.records || []);
        renderSheet();
        setStatus('');
      } catch (error) {
        setStatus(error.message || '기록을 불러오지 못했습니다.', true);
      }
    }

    async function saveDayRecord(day, silent = false) {
      if (!currentUser || !currentUser.userId) {
        setStatus('먼저 이름을 등록해 주세요.', true);
        return;
      }

      const input = getInputByDay(day);
      const btn = getSaveBtnByDay(day);
      if (!input || !btn) return;

      const memo = input.value.trim();

      if (!memo) {
        if (!silent) setStatus('빈칸은 저장할 수 없습니다.', true);
        input.value = currentRecordsMap[day]?.memo || '';
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';

      try {
        const result = await postJson({
          action: 'saveRecord',
          userId: currentUser.userId,
          year: getYear(),
          month: getMonth(),
          day: day,
          memo: memo
        });

        if (!result.success) {
          throw new Error(result.message || '저장에 실패했습니다.');
        }

        currentRecordsMap[day] = result.record;
        btn.textContent = '완료';
        btn.classList.add('saved');
        setStatus(`${day}일 기록이 저장되었습니다.`);

        setTimeout(() => {
          btn.textContent = '저장';
          btn.classList.remove('saved');
        }, 900);
      } catch (error) {
        btn.textContent = '저장';
        setStatus(error.message || '저장 중 오류가 발생했습니다.', true);
      } finally {
        btn.disabled = false;
      }
    }

    function moveMonth(offset) {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      currentDate = new Date(year, month + offset, 1);
      loadRecords();
    }

    prevBtn.addEventListener('click', () => moveMonth(-1));
    nextBtn.addEventListener('click', () => moveMonth(1));
    registerBtn.addEventListener('click', registerUser);

    userNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        registerUser();
      }
    });

    async function init() {
      renderHeader();
      renderRegisterBox();
      renderSheet();

      const hasUser = await initStoredUser();
      if (hasUser) {
        await loadRecords();
      }
    }

    init();
  </script>
</body>
</html>
