<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배우 작품활동 위젯</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111;
      background: #fff;
    }
    button, input, textarea { font: inherit; }
    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 8px 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .title-box h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      text-align: left;
    }
    .title-box p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #666;
      text-align: left;
    }
    .btn {
      height: 38px;
      padding: 0 14px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }
    .btn.dark {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .btn.small {
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }
    .pin-confirm-btn {
      font-size: 11px;
      padding: 0 12px;
    }
    .admin-tools {
      display: none;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .admin-tools.active { display: flex; }
    .card {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .form-card {
      display: none;
      margin-bottom: 14px;
    }
    .form-card.active { display: block; }
    .form-title {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field { margin-bottom: 10px; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #444;
    }
    .input, .textarea {
      width: 100%;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      outline: none;
    }
    .input {
      height: 38px;
      padding: 0 12px;
    }
    .textarea {
      min-height: 100px;
      padding: 10px 12px;
      resize: vertical;
    }
    .hint {
      margin-top: 5px;
      font-size: 11px;
      color: #777;
      line-height: 1.4;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .gallery-section {
      position: relative;
      width: 100%;
    }
    .gallery-nav {
      position: absolute;
      top: 38%;
      transform: translateY(-50%);
      z-index: 3;
      width: 28px;
      height: 48px;
      border: 0;
      background: rgba(255,255,255,0.96);
      color: #111;
      font-size: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .gallery-nav.show { display: inline-flex; }
    .gallery-prev {
      left: 0;
      border-radius: 0 10px 10px 0;
    }
    .gallery-next {
      right: 0;
      border-radius: 10px 0 0 10px;
    }
    .gallery-viewport {
      overflow: hidden;
      width: 100%;
      cursor: grab;
      touch-action: pan-y;
    }
    .gallery-viewport.dragging { cursor: grabbing; }
    .gallery-track {
      display: flex;
      gap: 10px;
      will-change: transform;
      transition: transform .28s ease;
      user-select: none;
    }
    .gallery-track.dragging { transition: none; }
    .poster-card {
      flex: 0 0 calc((100% - 40px) / 5);
      min-width: 0;
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      transition: transform .15s ease;
    }
    .poster-card:hover { transform: translateY(-2px); }
    .poster-img-wrap {
      aspect-ratio: 2.2 / 3;
      background: #ececf1;
      overflow: hidden;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .poster-info { padding: 8px; }
    .poster-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .poster-meta {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      padding: 30px 14px;
      text-align: center;
      font-size: 13px;
      color: #777;
      border: 1px dashed #d9d9de;
      border-radius: 16px;
      background: #fff;
    }
    .modal, .pin-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0,0,0,0.45);
      z-index: 50;
    }
    .modal.active, .pin-modal.active { display: flex; }
    .modal-box {
      width: min(760px, 100%);
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    .modal-inner {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
    }
    .modal-poster {
      background: #ececf1;
      min-height: 380px;
      position: relative;
    }
    .modal-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 2;
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    }
    .image-nav-btn.show { display: inline-flex; }
    .image-nav-prev { left: 10px; }
    .image-nav-next { right: 10px; }
    .image-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17,17,17,0.7);
      color: #fff;
      font-size: 11px;
      display: none;
      z-index: 2;
    }
    .image-count.show { display: inline-flex; }
    .modal-content { padding: 18px; }
    .modal-content h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }
    .meta-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #444;
    }
    .desc {
      font-size: 14px;
      line-height: 1.7;
      color: #222;
      white-space: pre-wrap;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .work-nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      z-index: 60;
      cursor: pointer;
      width: 28px;
      height: 44px;
      padding: 0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.65);
    }
    .work-nav-btn::after {
      content: attr(data-label);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(17,17,17,0.88);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 7px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
      white-space: nowrap;
    }
    .work-nav-btn:hover::after { opacity: 1; }
    .work-nav-btn.show { display: inline-flex; }
    .work-nav-prev { left: max(14px, calc(50% - 430px)); }
    .work-nav-prev::after { left: 24px; }
    .work-nav-next { right: max(14px, calc(50% - 430px)); }
    .work-nav-next::after { right: 24px; }
    .pin-box {
      width: min(340px, 100%);
      background: #fff;
      border-radius: 16px;
      padding: 18px;
    }
    .pin-box h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .pin-box p {
      margin: 0 0 12px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    .pin-row {
      display: flex;
      gap: 8px;
    }
    .pin-input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      outline: none;
      letter-spacing: 4px;
      text-align: center;
      font-size: 18px;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #d11a2a;
      min-height: 16px;
    }
    @media (max-width: 980px) {
      .poster-card { flex: 0 0 calc((100% - 20px) / 3); }
    }
    @media (max-width: 760px) {
      .wrap { padding: 8px 0; }
      .grid { grid-template-columns: 1fr; }
      .poster-card { flex: 0 0 calc((100% - 10px) / 2); }
      .modal-inner { grid-template-columns: 1fr; }
      .modal-poster {
        min-height: auto;
        aspect-ratio: 2.2 / 3;
      }
      .work-nav-btn {
        font-size: 28px;
        width: 24px;
        height: 36px;
      }
      .work-nav-prev { left: 8px; }
      .work-nav-next { right: 8px; }
      .work-nav-prev::after,
      .work-nav-next::after { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-box">
        <h1>배우 작품활동</h1>
        <p>포스터를 누르면 작품 상세 정보가 열립니다.</p>
      </div>
      <button id="adminBtn" class="btn">관리자</button>
    </div>

    <div id="adminTools" class="admin-tools">
      <button id="openAddBtn" class="btn dark">작품 추가</button>
      <button id="adminOffBtn" class="btn">관리자 모드 종료</button>
    </div>

    <div id="formCard" class="card form-card">
      <h2 id="formTitle" class="form-title">작품 추가</h2>
      <div class="grid">
        <div class="field">
          <label for="workTitle">작품명</label>
          <input id="workTitle" class="input" type="text" placeholder="예: 드라마 제목" />
        </div>
        <div class="field">
          <label for="workYear">공개일 / 연도</label>
          <input id="workYear" class="input" type="text" placeholder="예: 2026.03 / 2025" />
        </div>
        <div class="field">
          <label for="workRole">역할</label>
          <input id="workRole" class="input" type="text" placeholder="예: 주연 / 특별출연" />
        </div>
        <div class="field">
          <label for="workPlatform">플랫폼 / 구분</label>
          <input id="workPlatform" class="input" type="text" placeholder="예: 드라마 / 영화 / OTT" />
        </div>
        <div class="field full">
          <label for="workPosterFile">대표 포스터 업로드</label>
          <input id="workPosterFile" class="input" type="file" accept="image/*" />
          <div class="hint">대표 포스터 1장을 등록합니다. 이미지가 너무 크면 저장되지 않을 수 있습니다.</div>
        </div>
        <div class="field full">
          <label for="workExtraFiles">추가 이미지 업로드</label>
          <input id="workExtraFiles" class="input" type="file" accept="image/*" multiple />
          <div class="hint">상세 화면에서 볼 추가 이미지를 2~3장 정도 넣을 수 있습니다. 새로 선택하면 기존 추가 이미지를 대체합니다.</div>
        </div>
        <div class="field full">
          <label for="workDesc">설명</label>
          <textarea id="workDesc" class="textarea" placeholder="작품 소개, 배역, 메모 등을 적어 주세요."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button id="saveBtn" class="btn dark" type="button">저장</button>
        <button id="cancelBtn" class="btn" type="button">취소</button>
      </div>
    </div>

    <div class="gallery-section">
      <button id="galleryPrevBtn" class="gallery-nav gallery-prev" type="button">‹</button>
      <div id="galleryViewport" class="gallery-viewport">
        <div id="galleryTrack" class="gallery-track"></div>
      </div>
      <button id="galleryNextBtn" class="gallery-nav gallery-next" type="button">›</button>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <button id="workPrevBtn" class="work-nav-btn work-nav-prev" data-label="이전" type="button">‹</button>
    <div class="modal-box">
      <div class="modal-inner">
        <div class="modal-poster">
          <button id="imagePrevBtn" class="image-nav-btn image-nav-prev" type="button">‹</button>
          <img id="detailImg" src="" alt="포스터" />
          <button id="imageNextBtn" class="image-nav-btn image-nav-next" type="button">›</button>
          <div id="imageCount" class="image-count"></div>
        </div>
        <div class="modal-content">
          <h2 id="detailTitle"></h2>
          <div class="meta-list">
            <div><strong>공개일</strong> <span id="detailYear"></span></div>
            <div><strong>역할</strong> <span id="detailRole"></span></div>
            <div><strong>플랫폼</strong> <span id="detailPlatform"></span></div>
          </div>
          <div id="detailDesc" class="desc"></div>
          <div id="detailActions" class="modal-actions"></div>
        </div>
      </div>
    </div>
    <button id="workNextBtn" class="work-nav-btn work-nav-next" data-label="다음" type="button">›</button>
  </div>

  <div id="pinModal" class="pin-modal">
    <div class="pin-box">
      <h3>관리자 PIN</h3>
      <p>4자리 코드를 입력하시면 작품 추가·수정·삭제가 가능합니다.</p>
      <div class="pin-row">
        <input id="pinInput" class="pin-input" type="password" maxlength="4" inputmode="numeric" placeholder="••••" />
        <button id="pinConfirmBtn" class="btn dark pin-confirm-btn" type="button">확인</button>
      </div>
      <div id="pinStatus" class="status"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'actorWorksWidgetData_v3';
    const ADMIN_KEY = 'actorWorksAdmin_v3';
    const ADMIN_PIN = '0716';
    const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
        <rect width="400" height="600" fill="#ececf1"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#9a9aa3" font-size="24" font-family="sans-serif">NO IMAGE</text>
      </svg>
    `);

    const seedData = [{
      id: Date.now(),
      title: '샘플 작품',
      year: '2026',
      role: '주연',
      platform: '드라마',
      poster: PLACEHOLDER,
      images: [PLACEHOLDER],
      desc: '여기에 작품 소개와 배역 관련 내용을 넣으면 됩니다.'
    }];

    const el = {
      adminBtn: document.getElementById('adminBtn'),
      adminTools: document.getElementById('adminTools'),
      adminOffBtn: document.getElementById('adminOffBtn'),
      openAddBtn: document.getElementById('openAddBtn'),
      formCard: document.getElementById('formCard'),
      formTitle: document.getElementById('formTitle'),
      workTitle: document.getElementById('workTitle'),
      workYear: document.getElementById('workYear'),
      workRole: document.getElementById('workRole'),
      workPlatform: document.getElementById('workPlatform'),
      workPosterFile: document.getElementById('workPosterFile'),
      workExtraFiles: document.getElementById('workExtraFiles'),
      workDesc: document.getElementById('workDesc'),
      saveBtn: document.getElementById('saveBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      galleryTrack: document.getElementById('galleryTrack'),
      galleryViewport: document.getElementById('galleryViewport'),
      galleryPrevBtn: document.getElementById('galleryPrevBtn'),
      galleryNextBtn: document.getElementById('galleryNextBtn'),
      detailModal: document.getElementById('detailModal'),
      detailImg: document.getElementById('detailImg'),
      detailTitle: document.getElementById('detailTitle'),
      detailYear: document.getElementById('detailYear'),
      detailRole: document.getElementById('detailRole'),
      detailPlatform: document.getElementById('detailPlatform'),
      detailDesc: document.getElementById('detailDesc'),
      detailActions: document.getElementById('detailActions'),
      imagePrevBtn: document.getElementById('imagePrevBtn'),
      imageNextBtn: document.getElementById('imageNextBtn'),
      imageCount: document.getElementById('imageCount'),
      workPrevBtn: document.getElementById('workPrevBtn'),
      workNextBtn: document.getElementById('workNextBtn'),
      pinModal: document.getElementById('pinModal'),
      pinInput: document.getElementById('pinInput'),
      pinConfirmBtn: document.getElementById('pinConfirmBtn'),
      pinStatus: document.getElementById('pinStatus')
    };

    let items = [];
    let isAdmin = false;
    let editingId = null;
    let currentDetailIndex = -1;
    let currentImageIndex = 0;
    let galleryIndex = 0;
    let cardsPerView = getCardsPerView();
    let startX = 0;
    let currentTranslate = 0;
    let prevTranslate = 0;
    let isDragging = false;
    let moved = false;

    function getCardsPerView() {
      if (window.innerWidth <= 760) return 2;
      if (window.innerWidth <= 980) return 3;
      return 5;
    }

    function normalizeItems(data) {
      return (data || []).map(item => {
        const basePoster = item.poster || PLACEHOLDER;
        const images = Array.isArray(item.images) && item.images.length ? item.images.filter(Boolean) : [basePoster];
        return { ...item, poster: basePoster, images: images.length ? images : [basePoster] };
      });
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        const parsed = saved ? JSON.parse(saved) : null;
        items = normalizeItems(Array.isArray(parsed) && parsed.length ? parsed : seedData);
      } catch (e) {
        items = normalizeItems(seedData);
      }
      isAdmin = localStorage.getItem(ADMIN_KEY) === 'true';
    }

    function persistItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function persistAdmin() {
      localStorage.setItem(ADMIN_KEY, isAdmin ? 'true' : 'false');
    }

    function setAdminMode(value) {
      isAdmin = value;
      persistAdmin();
      el.adminTools.classList.toggle('active', value);
      el.adminBtn.textContent = value ? '관리자 모드 사용 중' : '관리자';
      if (!value) closeForm();
      renderGallery();
    }

    function maxGalleryIndex() {
      return Math.max(0, items.length - cardsPerView);
    }

    function getCardStep() {
      const firstCard = el.galleryTrack.querySelector('.poster-card');
      if (!firstCard) return 0;
      const style = window.getComputedStyle(el.galleryTrack);
      const gap = parseFloat(style.columnGap || style.gap || 0) || 0;
      return firstCard.getBoundingClientRect().width + gap;
    }

    function updateGalleryPosition(animate = true) {
      const step = getCardStep();
      const translate = -(galleryIndex * step);
      el.galleryTrack.classList.toggle('dragging', !animate);
      el.galleryTrack.style.transform = `translateX(${translate}px)`;
      prevTranslate = translate;
      currentTranslate = translate;
      el.galleryPrevBtn.classList.toggle('show', items.length > cardsPerView && galleryIndex > 0);
      el.galleryNextBtn.classList.toggle('show', items.length > cardsPerView && galleryIndex < maxGalleryIndex());
    }

    function renderGallery() {
      cardsPerView = getCardsPerView();
      if (!items.length) {
        el.galleryTrack.innerHTML = '<div class="empty">등록된 작품이 없습니다.</div>';
        el.galleryPrevBtn.classList.remove('show');
        el.galleryNextBtn.classList.remove('show');
        return;
      }

      el.galleryTrack.innerHTML = items.map((item, index) => `
        <div class="poster-card" data-index="${index}">
          <div class="poster-img-wrap">
            <img class="poster-img" src="${item.poster || PLACEHOLDER}" alt="${(item.title || '').replace(/"/g, '&quot;')}" onerror="this.src='${PLACEHOLDER}'" />
          </div>
          <div class="poster-info">
            <div class="poster-title">${escapeHtml(item.title)}</div>
            <div class="poster-meta">${escapeHtml(item.year || '')} · ${escapeHtml(item.platform || '')}</div>
          </div>
        </div>
      `).join('');

      if (galleryIndex > maxGalleryIndex()) galleryIndex = maxGalleryIndex();
      el.galleryTrack.querySelectorAll('.poster-card').forEach(card => {
        card.addEventListener('click', () => {
          if (moved) return;
          const index = Number(card.dataset.index);
          if (!Number.isNaN(index)) openDetailByIndex(index);
        });
      });
      updateGalleryPosition(true);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function updateDetailImage(item) {
      const images = Array.isArray(item.images) && item.images.length ? item.images : [item.poster || PLACEHOLDER];
      if (currentImageIndex < 0) currentImageIndex = 0;
      if (currentImageIndex > images.length - 1) currentImageIndex = images.length - 1;
      el.detailImg.src = images[currentImageIndex] || item.poster || PLACEHOLDER;
      el.imagePrevBtn.classList.toggle('show', images.length > 1);
      el.imageNextBtn.classList.toggle('show', images.length > 1);
      el.imageCount.classList.toggle('show', images.length > 1);
      el.imageCount.textContent = images.length > 1 ? `${currentImageIndex + 1} / ${images.length}` : '';
    }

    function updateWorkNavButtons() {
      const show = items.length > 1;
      el.workPrevBtn.classList.toggle('show', show);
      el.workNextBtn.classList.toggle('show', show);
    }

    function openDetailByIndex(index) {
      if (!items.length) return;
      if (index < 0) index = items.length - 1;
      if (index > items.length - 1) index = 0;
      currentDetailIndex = index;
      currentImageIndex = 0;
      const item = items[index];

      el.detailTitle.textContent = item.title || '';
      el.detailYear.textContent = item.year || '-';
      el.detailRole.textContent = item.role || '-';
      el.detailPlatform.textContent = item.platform || '-';
      el.detailDesc.textContent = item.desc || '';
      updateDetailImage(item);
      updateWorkNavButtons();

      if (isAdmin) {
        el.detailActions.innerHTML = `
          <button class="btn small dark" id="editWorkBtn" type="button">수정</button>
          <button class="btn small" id="deleteWorkBtn" type="button">삭제</button>
          <button class="btn small" id="closeDetailBtn" type="button">닫기</button>
        `;
        document.getElementById('editWorkBtn').addEventListener('click', () => {
          closeDetail();
          openEdit(item.id);
        });
        document.getElementById('deleteWorkBtn').addEventListener('click', () => {
          const ok = window.confirm('이 작품을 삭제하시겠습니까?');
          if (!ok) return;
          items = items.filter(v => v.id !== item.id);
          persistItems();
          closeDetail();
          renderGallery();
          window.alert('삭제했습니다.');
        });
        document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
      } else {
        el.detailActions.innerHTML = `<button class="btn small" id="closeDetailBtn" type="button">닫기</button>`;
        document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
      }

      el.detailModal.classList.add('active');
    }

    function closeDetail() {
      el.detailModal.classList.remove('active');
    }

    function resetForm() {
      editingId = null;
      el.formTitle.textContent = '작품 추가';
      el.workTitle.value = '';
      el.workYear.value = '';
      el.workRole.value = '';
      el.workPlatform.value = '';
      el.workPosterFile.value = '';
      el.workExtraFiles.value = '';
      el.workDesc.value = '';
    }

    function closeForm() {
      el.formCard.classList.remove('active');
      resetForm();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openAdd() {
      resetForm();
      el.formCard.classList.add('active');
    }

    function openEdit(id) {
      const item = items.find(v => v.id === id);
      if (!item) return;
      editingId = id;
      el.formTitle.textContent = '작품 수정';
      el.workTitle.value = item.title || '';
      el.workYear.value = item.year || '';
      el.workRole.value = item.role || '';
      el.workPlatform.value = item.platform || '';
      el.workPosterFile.value = '';
      el.workExtraFiles.value = '';
      el.workDesc.value = item.desc || '';
      el.formCard.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function filesToDataURLs(fileList, limit) {
      const files = Array.from(fileList || []).slice(0, limit);
      const results = [];
      for (const file of files) {
        results.push(await fileToDataURL(file));
      }
      return results;
    }

    async function saveWork() {
      const isEditing = !!editingId;
      const title = el.workTitle.value.trim();
      if (!title) {
        window.alert('작품명을 입력해 주세요.');
        el.workTitle.focus();
        return;
      }

      el.saveBtn.disabled = true;

      try {
        const existingItem = isEditing ? items.find(v => v.id === editingId) : null;
        let poster = existingItem?.poster || PLACEHOLDER;
        let images = Array.isArray(existingItem?.images) && existingItem.images.length ? [...existingItem.images] : [poster];
        const posterFile = el.workPosterFile.files[0];
        const extraFiles = el.workExtraFiles.files;

        if (posterFile) {
          poster = await fileToDataURL(posterFile);
        }

        if (extraFiles && extraFiles.length) {
          const extraImages = await filesToDataURLs(extraFiles, 3);
          images = [poster, ...extraImages];
        } else if (posterFile) {
          images = [poster, ...images.slice(1, 4)];
        } else if (!images.length) {
          images = [poster];
        } else {
          images[0] = poster;
        }

        const payload = {
          id: isEditing ? editingId : Date.now(),
          title,
          year: el.workYear.value.trim(),
          role: el.workRole.value.trim(),
          platform: el.workPlatform.value.trim(),
          poster: poster || PLACEHOLDER,
          images: images.filter(Boolean).slice(0, 4),
          desc: el.workDesc.value.trim()
        };

        if (isEditing) {
          items = items.map(v => v.id === editingId ? payload : v);
        } else {
          items = [payload, ...items];
        }

        persistItems();
        renderGallery();
        closeForm();
        window.alert(isEditing ? '수정했습니다.' : '등록했습니다.');
      } catch (e) {
        window.alert('저장에 실패했습니다. 이미지 파일이 너무 크거나 브라우저 저장 한도를 넘었을 수 있습니다. 더 작은 이미지로 다시 시도해 주세요.');
      } finally {
        el.saveBtn.disabled = false;
      }
    }

    function pointerDown(x) {
      isDragging = true;
      moved = false;
      startX = x;
      el.galleryViewport.classList.add('dragging');
      el.galleryTrack.classList.add('dragging');
    }

    function pointerMove(x) {
      if (!isDragging) return;
      const diff = x - startX;
      if (Math.abs(diff) > 6) moved = true;
      currentTranslate = prevTranslate + diff;
      el.galleryTrack.style.transform = `translateX(${currentTranslate}px)`;
    }

    function pointerUp() {
      if (!isDragging) return;
      isDragging = false;
      el.galleryViewport.classList.remove('dragging');
      el.galleryTrack.classList.remove('dragging');
      const movedBy = currentTranslate - prevTranslate;
      if (movedBy < -50 && galleryIndex < maxGalleryIndex()) galleryIndex += 1;
      if (movedBy > 50 && galleryIndex > 0) galleryIndex -= 1;
      updateGalleryPosition(true);
      setTimeout(() => { moved = false; }, 0);
    }

    el.galleryPrevBtn.addEventListener('click', () => {
      if (galleryIndex > 0) {
        galleryIndex -= 1;
        updateGalleryPosition(true);
      }
    });

    el.galleryNextBtn.addEventListener('click', () => {
      if (galleryIndex < maxGalleryIndex()) {
        galleryIndex += 1;
        updateGalleryPosition(true);
      }
    });

    el.galleryViewport.addEventListener('mousedown', (e) => pointerDown(e.clientX));
    el.galleryViewport.addEventListener('mousemove', (e) => pointerMove(e.clientX));
    el.galleryViewport.addEventListener('mouseup', pointerUp);
    el.galleryViewport.addEventListener('mouseleave', pointerUp);
    el.galleryViewport.addEventListener('touchstart', (e) => pointerDown(e.touches[0].clientX), { passive: true });
    el.galleryViewport.addEventListener('touchmove', (e) => pointerMove(e.touches[0].clientX), { passive: true });
    el.galleryViewport.addEventListener('touchend', pointerUp);

    el.adminBtn.addEventListener('click', () => {
      if (isAdmin) return;
      el.pinInput.value = '';
      el.pinStatus.textContent = '';
      el.pinModal.classList.add('active');
      setTimeout(() => el.pinInput.focus(), 50);
    });

    el.pinConfirmBtn.addEventListener('click', () => {
      if (el.pinInput.value === ADMIN_PIN) {
        el.pinModal.classList.remove('active');
        setAdminMode(true);
      } else {
        el.pinStatus.textContent = 'PIN이 올바르지 않습니다.';
      }
    });

    el.pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') el.pinConfirmBtn.click();
    });

    el.adminOffBtn.addEventListener('click', () => setAdminMode(false));
    el.openAddBtn.addEventListener('click', openAdd);
    el.cancelBtn.addEventListener('click', closeForm);
    el.saveBtn.addEventListener('click', saveWork);

    el.imagePrevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentDetailIndex < 0) return;
      const item = items[currentDetailIndex];
      const images = Array.isArray(item.images) && item.images.length ? item.images : [item.poster || PLACEHOLDER];
      currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
      updateDetailImage(item);
    });

    el.imageNextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentDetailIndex < 0) return;
      const item = items[currentDetailIndex];
      const images = Array.isArray(item.images) && item.images.length ? item.images : [item.poster || PLACEHOLDER];
      currentImageIndex = (currentImageIndex + 1) % images.length;
      updateDetailImage(item);
    });

    el.workPrevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDetailByIndex(currentDetailIndex - 1);
    });

    el.workNextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDetailByIndex(currentDetailIndex + 1);
    });

    el.detailModal.addEventListener('click', (e) => {
      if (e.target === el.detailModal) closeDetail();
    });

    el.pinModal.addEventListener('click', (e) => {
      if (e.target === el.pinModal) el.pinModal.classList.remove('active');
    });

    window.addEventListener('resize', () => {
      cardsPerView = getCardsPerView();
      if (galleryIndex > maxGalleryIndex()) galleryIndex = maxGalleryIndex();
      updateGalleryPosition(true);
    });

    loadState();
    setAdminMode(isAdmin);
    renderGallery();
  </script>
</body>
</html>
