<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오 위젯</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111;
      background: #fff;
    }

    button, input, textarea { font: inherit; }

    button:focus,
    button:focus-visible,
    input:focus,
    input:focus-visible,
    textarea:focus,
    textarea:focus-visible,
    .item:focus,
    .item:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      text-align: left;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      height: 36px;
      padding: 0 14px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .btn.dark {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .btn.danger {
      color: #b42318;
      border-color: #efc0c0;
      background: #fff;
    }

    .btn.small {
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0;
    }

    .more-btn {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 2px;
    }

    .status-bar {
      display: none;
    }

    .list-viewport {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(17,17,17,0.35) transparent;
    }

    .list-viewport::-webkit-scrollbar {
      height: 4px;
    }

    .list-viewport::-webkit-scrollbar-track {
      background: transparent;
    }

    .list-viewport::-webkit-scrollbar-thumb {
      background: rgba(17,17,17,0.28);
      border-radius: 999px;
    }

    .list {
      display: flex;
      gap: 12px;
      align-items: stretch;
      min-width: 100%;
      width: max-content;
    }

    .item {
      position: relative;
      flex: 0 0 calc((100% - 48px) / 5);
      min-width: 210px;
      max-width: 250px;
      border: 1px solid #e8e8ed;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    .item:hover {
      transform: translateY(-1px);
    }

    .item.active {
      border-color: #e8e8ed;
      box-shadow: none;
    }

    .item.admin {
      cursor: grab;
    }

    .item.dragging {
      opacity: 0.45;
    }

    .item.drag-over {
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(17,17,17,0.14);
    }

    .thumb {
      position: relative;
      aspect-ratio: 2 / 3;
      background: #ececf1;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .thumb-delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 32px;
      padding: 0 10px;
      border: 0;
      border-radius: 999px;
      background: rgba(17,17,17,0.88);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
    }

    .item.admin .thumb-delete-btn {
      display: inline-flex;
    }

    .body {
      padding: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    .desc {
      display: none;
    }

    .empty {
      width: 100%;
      border: 1px dashed #d9d9de;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #777;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0,0,0,0.45);
      z-index: 50;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(900px, 100%);
      height: min(720px, calc(100vh - 32px));
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    .modal-inner {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      height: 100%;
      min-height: 0;
    }

    .modal-poster {
      background: #ececf1;
      height: 100%;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .modal-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 2;
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    }

    .image-nav-btn.show {
      display: inline-flex;
    }

    .image-nav-prev {
      left: 10px;
    }

    .image-nav-next {
      right: 10px;
    }

    .image-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17,17,17,0.7);
      color: #fff;
      font-size: 11px;
      display: none;
      z-index: 2;
    }

    .image-count.show {
      display: inline-flex;
    }

    .modal-content {
      padding: 22px;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .modal-content h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
      flex-shrink: 0;
    }

    .meta-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #444;
      flex-shrink: 0;
    }

    .detail-desc {
      flex: 1 1 auto;
      min-height: 0;
      height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 8px;
      font-size: 14px;
      line-height: 1.7;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .detail-desc::-webkit-scrollbar {
      width: 4px;
    }

    .detail-desc::-webkit-scrollbar-track {
      background: transparent;
    }

    .detail-desc::-webkit-scrollbar-thumb {
      background: rgba(17,17,17,0.25);
      border-radius: 999px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .work-nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      z-index: 60;
      cursor: pointer;
      width: 28px;
      height: 44px;
      padding: 0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.65);
    }

    .work-nav-btn::after {
      content: attr(data-label);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(17,17,17,0.88);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 7px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
      white-space: nowrap;
    }

    .work-nav-btn:hover::after {
      opacity: 1;
    }

    .work-nav-btn.show {
      display: inline-flex;
    }

    .work-nav-prev {
      left: max(14px, calc(50% - 510px));
    }

    .work-nav-prev::after {
      left: 24px;
    }

    .work-nav-next {
      right: max(14px, calc(50% - 510px));
    }

    .work-nav-next::after {
      right: 24px;
    }

    .editor-modal-box {
      width: min(900px, 100%);
      height: min(720px, calc(100vh - 32px));
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .editor-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 6px;
    }

    .editor-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .editor-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .editor-scroll::-webkit-scrollbar-thumb {
      background: rgba(17,17,17,0.22);
      border-radius: 999px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: #444;
    }

    .input, .textarea {
      width: 100%;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
    }

    .input {
      height: 38px;
      padding: 0 12px;
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
    }

    .hint {
      margin-top: 5px;
      font-size: 11px;
      color: #777;
      line-height: 1.4;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .editor-status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
      flex-shrink: 0;
    }

    .editor-status.error {
      color: #c62828;
    }

    @media (max-width: 980px) {
      .item {
        flex: 0 0 calc((100% - 24px) / 3);
        max-width: none;
      }
    }

    @media (max-width: 760px) {
      .item {
        flex: 0 0 calc((100% - 12px) / 2);
        min-width: 180px;
        max-width: none;
      }

      .modal-box,
      .editor-modal-box {
        width: 100%;
        height: calc(100vh - 24px);
      }

      .modal-inner {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(220px, 42vh) minmax(0, 1fr);
      }

      .modal-poster {
        height: 100%;
        min-height: 0;
      }

      .modal-content {
        height: 100%;
        min-height: 0;
      }

      .detail-desc {
        flex: 1 1 auto;
        min-height: 0;
        height: 0;
      }

      .work-nav-btn {
        font-size: 28px;
        width: 24px;
        height: 36px;
      }

      .work-nav-prev {
        left: 8px;
      }

      .work-nav-next {
        right: 8px;
      }

      .work-nav-prev::after,
      .work-nav-next::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>참여 프로젝트</h1>
    <div class="top-actions">
      <button id="changePinBtn" class="btn" type="button" style="display:none;">비밀번호 변경</button>
      <button
        id="adminBtn"
        class="btn icon-btn more-btn"
        type="button"
        aria-label="관리자 모드"
        title="관리자 모드"
      >⋯</button>
      <button id="addBtn" class="btn dark" type="button" style="display:none;">추가</button>
    </div>
  </div>

  <div id="pageStatus" class="status-bar"></div>

  <div class="list-viewport">
    <div id="list" class="list"></div>
  </div>

  <div id="detailModal" class="modal">
    <button id="workPrevBtn" class="work-nav-btn work-nav-prev" data-label="이전" type="button">‹</button>
    <div class="modal-box">
      <div class="modal-inner">
        <div class="modal-poster">
          <button id="imagePrevBtn" class="image-nav-btn image-nav-prev" type="button">‹</button>
          <img id="detailImg" src="" alt="포스터" />
          <button id="imageNextBtn" class="image-nav-btn image-nav-next" type="button">›</button>
          <div id="imageCount" class="image-count"></div>
        </div>
        <div class="modal-content">
          <h2 id="detailTitle"></h2>
          <div class="meta-list">
            <div><strong>참여 기간</strong> <span id="detailYear"></span></div>
            <div><strong>역할</strong> <span id="detailRole"></span></div>
            <div><strong>기업명</strong> <span id="detailPlatform"></span></div>
          </div>
          <div id="detailDesc" class="detail-desc"></div>
          <div class="modal-actions">
            <button id="detailEditBtn" class="btn dark" type="button">수정</button>
            <button id="detailCloseBtn" class="btn" type="button">닫기</button>
          </div>
        </div>
      </div>
    </div>
    <button id="workNextBtn" class="work-nav-btn work-nav-next" data-label="다음" type="button">›</button>
  </div>

  <div id="pinModal" class="modal">
    <div class="editor-modal-box" style="width:min(360px, 100%); height:auto; padding:16px;">
      <h2 class="editor-title">관리자 모드</h2>
      <div class="field">
        <label for="pinInput">비밀번호</label>
        <input id="pinInput" class="input" type="password" inputmode="numeric" maxlength="4" placeholder="4자리 입력" />
      </div>
      <div class="editor-actions">
        <button id="pinConfirmBtn" class="btn dark" type="button">확인</button>
        <button id="pinCancelBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="pinStatus" class="editor-status"></div>
    </div>
  </div>

  <div id="deleteModal" class="modal">
    <div class="editor-modal-box" style="width:min(360px, 100%); height:auto; padding:16px;">
      <h2 class="editor-title">작품 삭제</h2>
      <div class="editor-status" style="min-height:auto; margin-top:0;">이 작품을 삭제하시겠습니까?</div>
      <div class="editor-actions">
        <button id="deleteConfirmBtn" class="btn danger" type="button">삭제</button>
        <button id="deleteCancelBtn" class="btn" type="button">취소</button>
      </div>
    </div>
  </div>

  <div id="changePinModal" class="modal">
    <div class="editor-modal-box" style="width:min(420px, 100%); height:auto; padding:16px;">
      <h2 class="editor-title">비밀번호 변경</h2>
      <div class="field">
        <label for="currentPinInput">현재 비밀번호</label>
        <input id="currentPinInput" class="input" type="password" inputmode="numeric" maxlength="4" placeholder="현재 4자리 입력" />
      </div>
      <div class="field">
        <label for="newPinInput">새 비밀번호</label>
        <input id="newPinInput" class="input" type="password" inputmode="numeric" maxlength="4" placeholder="새 4자리 입력" />
      </div>
      <div class="field">
        <label for="newPinConfirmInput">새 비밀번호 확인</label>
        <input id="newPinConfirmInput" class="input" type="password" inputmode="numeric" maxlength="4" placeholder="새 4자리 다시 입력" />
      </div>
      <div class="editor-actions">
        <button id="changePinConfirmBtn" class="btn dark" type="button">변경</button>
        <button id="changePinCancelBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="changePinStatus" class="editor-status"></div>
    </div>
  </div>

  <div id="editorModal" class="modal">
    <div class="editor-modal-box">
      <h2 id="editorTitle" class="editor-title">작품 추가</h2>

      <div class="editor-scroll">
        <div class="field">
          <label for="title">프로젝트 명</label>
          <input id="title" class="input" type="text" />
        </div>
        <div class="field">
          <label for="year">참여 기간</label>
          <input id="year" class="input" type="text" />
        </div>
        <div class="field">
          <label for="role">역할</label>
          <input id="role" class="input" type="text" />
        </div>
        <div class="field">
          <label for="platform">기업 명</label>
          <input id="platform" class="input" type="text" />
        </div>
        <div class="field">
          <label for="poster">대표 포스터 업로드</label>
          <input id="poster" class="input" type="file" accept="image/*" />
          <div class="hint">이미지는 업로드 시 자동으로 압축되어 저장됩니다. 세로형 이미지를 권장합니다.</div>
        </div>
        <div class="field">
          <label for="extras">추가 이미지 업로드</label>
          <input id="extras" class="input" type="file" accept="image/*" multiple />
          <div class="hint">추가 이미지는 최대 2장까지 자동 압축 후 저장됩니다.</div>
        </div>
        <div class="field">
          <label for="desc">설명</label>
          <textarea id="desc" class="textarea"></textarea>
        </div>
      </div>

      <div class="editor-actions">
        <button id="saveBtn" class="btn dark" type="button">저장</button>
        <button id="cancelBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="editorStatus" class="editor-status"></div>
    </div>
  </div>

  <script>
    const WIDGET_ID = 'actor_widget_embed_001';
    const DB_NAME = `actor_widget_indexeddb_${WIDGET_ID}`;
    const STORE_NAME = 'state';
    const STATE_KEY = 'main';
    const ADMIN_KEY = `actor_widget_admin_${WIDGET_ID}`;
    const ADMIN_PIN_KEY = `actor_widget_admin_pin_${WIDGET_ID}`;
    const DEFAULT_ADMIN_PIN = '0716';

    const PLACEHOLDER =
      'data:image/svg+xml;utf8,' +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
          <rect width="400" height="600" fill="#ececf1"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#9a9aa3" font-size="24" font-family="sans-serif">NO IMAGE</text>
        </svg>
      `);

    const seedData = [
      {
        id: Date.now(),
        title: '샘플 작품',
        year: '2026',
        role: '주연',
        platform: '드라마',
        poster: PLACEHOLDER,
        extras: [],
        desc: '여기에 작품 소개를 적으면 됩니다.'
      }
    ];

    const el = {
      adminBtn: document.getElementById('adminBtn'),
      changePinBtn: document.getElementById('changePinBtn'),
      addBtn: document.getElementById('addBtn'),
      pageStatus: document.getElementById('pageStatus'),
      list: document.getElementById('list'),
      detailModal: document.getElementById('detailModal'),
      detailImg: document.getElementById('detailImg'),
      detailTitle: document.getElementById('detailTitle'),
      detailYear: document.getElementById('detailYear'),
      detailRole: document.getElementById('detailRole'),
      detailPlatform: document.getElementById('detailPlatform'),
      detailDesc: document.getElementById('detailDesc'),
      imagePrevBtn: document.getElementById('imagePrevBtn'),
      imageNextBtn: document.getElementById('imageNextBtn'),
      imageCount: document.getElementById('imageCount'),
      detailEditBtn: document.getElementById('detailEditBtn'),
      detailCloseBtn: document.getElementById('detailCloseBtn'),
      workPrevBtn: document.getElementById('workPrevBtn'),
      workNextBtn: document.getElementById('workNextBtn'),
      pinModal: document.getElementById('pinModal'),
      pinInput: document.getElementById('pinInput'),
      pinConfirmBtn: document.getElementById('pinConfirmBtn'),
      pinCancelBtn: document.getElementById('pinCancelBtn'),
      pinStatus: document.getElementById('pinStatus'),
      deleteModal: document.getElementById('deleteModal'),
      deleteConfirmBtn: document.getElementById('deleteConfirmBtn'),
      deleteCancelBtn: document.getElementById('deleteCancelBtn'),
      changePinModal: document.getElementById('changePinModal'),
      currentPinInput: document.getElementById('currentPinInput'),
      newPinInput: document.getElementById('newPinInput'),
      newPinConfirmInput: document.getElementById('newPinConfirmInput'),
      changePinConfirmBtn: document.getElementById('changePinConfirmBtn'),
      changePinCancelBtn: document.getElementById('changePinCancelBtn'),
      changePinStatus: document.getElementById('changePinStatus'),
      editorModal: document.getElementById('editorModal'),
      editorTitle: document.getElementById('editorTitle'),
      title: document.getElementById('title'),
      year: document.getElementById('year'),
      role: document.getElementById('role'),
      platform: document.getElementById('platform'),
      poster: document.getElementById('poster'),
      extras: document.getElementById('extras'),
      desc: document.getElementById('desc'),
      saveBtn: document.getElementById('saveBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      editorStatus: document.getElementById('editorStatus')
    };

    let db = null;
    let items = [];
    let editingId = null;
    let activeId = null;
    let currentDetailIndex = -1;
    let currentImageIndex = 0;
    let isAdmin = false;
    let adminPin = DEFAULT_ADMIN_PIN;
    let pendingDeleteId = null;
    let dragId = null;

    function setPageStatus(text = '', isError = false) {
      el.pageStatus.textContent = text;
      el.pageStatus.classList.toggle('error', !!isError);
    }

    function setEditorStatus(text = '', isError = false) {
      el.editorStatus.textContent = text;
      el.editorStatus.classList.toggle('error', !!isError);
    }

    function setPinStatus(text = '', isError = false) {
      el.pinStatus.textContent = text;
      el.pinStatus.classList.toggle('error', !!isError);
    }

    function setChangePinStatus(text = '', isError = false) {
      el.changePinStatus.textContent = text;
      el.changePinStatus.classList.toggle('error', !!isError);
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: 'key' });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function dbGetState() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(STATE_KEY);
        request.onsuccess = () => resolve(request.result ? request.result.value : null);
        request.onerror = () => reject(request.error);
      });
    }

    function dbSaveState() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ key: STATE_KEY, value: items });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    }

    async function loadItems() {
      try {
        db = await openDatabase();
        const saved = await dbGetState();
        items = Array.isArray(saved) && saved.length ? saved : seedData;
      } catch (e) {
        items = seedData;
      }
      isAdmin = localStorage.getItem(ADMIN_KEY) === 'true';
      adminPin = localStorage.getItem(ADMIN_PIN_KEY) || DEFAULT_ADMIN_PIN;
    }

    async function saveItems() {
      await dbSaveState();
    }

    function saveAdminMode() {
      localStorage.setItem(ADMIN_KEY, isAdmin ? 'true' : 'false');
    }

    function saveAdminPin() {
      localStorage.setItem(ADMIN_PIN_KEY, adminPin);
    }

    function closeDetail() {
      el.detailModal.classList.remove('active');
    }

    function openPinModal() {
      el.pinInput.value = '';
      setPinStatus('');
      el.pinModal.classList.add('active');
    }

    function closePinModal() {
      el.pinModal.classList.remove('active');
      el.pinInput.value = '';
      setPinStatus('');
    }

    function openDeleteModal(id) {
      pendingDeleteId = id;
      el.deleteModal.classList.add('active');
    }

    function closeDeleteModal() {
      pendingDeleteId = null;
      el.deleteModal.classList.remove('active');
    }

    function openChangePinModal() {
      el.currentPinInput.value = '';
      el.newPinInput.value = '';
      el.newPinConfirmInput.value = '';
      setChangePinStatus('');
      el.changePinModal.classList.add('active');
    }

    function closeChangePinModal() {
      el.changePinModal.classList.remove('active');
      el.currentPinInput.value = '';
      el.newPinInput.value = '';
      el.newPinConfirmInput.value = '';
      setChangePinStatus('');
    }

    function openEditor() {
      el.editorModal.classList.add('active');
    }

    function clearFileInputs() {
      el.poster.value = '';
      el.extras.value = '';
    }

    function resetEditorFields() {
      editingId = null;
      activeId = null;
      el.title.value = '';
      el.year.value = '';
      el.role.value = '';
      el.platform.value = '';
      el.poster.value = '';
      el.extras.value = '';
      el.desc.value = '';
      el.editorTitle.textContent = '작품 추가';
      setEditorStatus('');
    }

    function closeEditor() {
      el.editorModal.classList.remove('active');
      resetEditorFields();
      clearFileInputs();
      render();
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function compressImageFile(file, options = {}) {
      const { maxWidth = 900, maxHeight = 1350, quality = 0.78, mimeType = 'image/jpeg' } = options;
      const img = await loadImageFromFile(file);
      let { width, height } = img;
      const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
      width = Math.max(1, Math.round(width * ratio));
      height = Math.max(1, Math.round(height * ratio));
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      let output = canvas.toDataURL(mimeType, quality);
      if (output.length > 900000) output = canvas.toDataURL(mimeType, 0.65);
      if (output.length > 700000) {
        const secondCanvas = document.createElement('canvas');
        secondCanvas.width = Math.max(1, Math.round(width * 0.85));
        secondCanvas.height = Math.max(1, Math.round(height * 0.85));
        const secondCtx = secondCanvas.getContext('2d', { alpha: false });
        secondCtx.fillStyle = '#ffffff';
        secondCtx.fillRect(0, 0, secondCanvas.width, secondCanvas.height);
        secondCtx.drawImage(canvas, 0, 0, secondCanvas.width, secondCanvas.height);
        output = secondCanvas.toDataURL(mimeType, 0.6);
      }
      return output;
    }

    async function filesToDataURLs(fileList, limit) {
      const files = Array.from(fileList || []).slice(0, limit);
      const results = [];
      for (const file of files) {
        results.push(await compressImageFile(file, { maxWidth: 900, maxHeight: 1350, quality: 0.72 }));
      }
      return results;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function getImageList(item) {
      return [item.poster || PLACEHOLDER, ...(item.extras || [])].filter(Boolean);
    }

    function updateDetailImage(item) {
      const images = getImageList(item);
      currentImageIndex = Math.max(0, Math.min(currentImageIndex, images.length - 1));
      el.detailImg.src = images[currentImageIndex] || PLACEHOLDER;
      el.imagePrevBtn.classList.toggle('show', images.length > 1);
      el.imageNextBtn.classList.toggle('show', images.length > 1);
      el.imageCount.classList.toggle('show', images.length > 1);
      el.imageCount.textContent = images.length > 1 ? `${currentImageIndex + 1} / ${images.length}` : '';
    }

    function updateWorkNavButtons() {
      const show = items.length > 1;
      el.workPrevBtn.classList.toggle('show', show);
      el.workNextBtn.classList.toggle('show', show);
    }

    function openDetailByIndex(index) {
      if (!items.length) return;
      if (index < 0) index = items.length - 1;
      if (index >= items.length) index = 0;

      currentDetailIndex = index;
      currentImageIndex = 0;

      const item = items[index];
      activeId = item.id;

      el.detailTitle.textContent = item.title || '';
      el.detailYear.textContent = item.year || '-';
      el.detailRole.textContent = item.role || '-';
      el.detailPlatform.textContent = item.platform || '-';
      el.detailDesc.textContent = item.desc || '';
      el.detailDesc.scrollTop = 0;

      updateDetailImage(item);
      updateWorkNavButtons();
      el.detailEditBtn.style.display = isAdmin ? 'inline-flex' : 'none';
      el.detailModal.classList.add('active');
      render();
    }

    function openEdit(item) {
      editingId = item.id;
      activeId = item.id;
      el.title.value = item.title || '';
      el.year.value = item.year || '';
      el.role.value = item.role || '';
      el.platform.value = item.platform || '';
      el.poster.value = '';
      el.extras.value = '';
      el.desc.value = item.desc || '';
      el.editorTitle.textContent = '작품 수정';
      openEditor();
      setEditorStatus('기존 이미지는 새 파일을 올리지 않으면 유지됩니다.');
      render();
    }

    function reorderItems(fromId, toId) {
      if (fromId == null || toId == null || fromId === toId) return;
      const fromIndex = items.findIndex(v => v.id === fromId);
      const toIndex = items.findIndex(v => v.id === toId);
      if (fromIndex < 0 || toIndex < 0) return;
      const [moved] = items.splice(fromIndex, 1);
      items.splice(toIndex, 0, moved);
    }

    function attachDragHandlers() {
      if (!isAdmin) return;

      el.list.querySelectorAll('.item').forEach(card => {
        card.setAttribute('draggable', 'true');

        card.addEventListener('dragstart', (e) => {
          if (e.target.closest('.thumb-delete-btn')) {
            e.preventDefault();
            return;
          }
          dragId = Number(card.dataset.id);
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        card.addEventListener('dragend', () => {
          dragId = null;
          card.classList.remove('dragging');
          el.list.querySelectorAll('.item').forEach(v => v.classList.remove('drag-over'));
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (Number(card.dataset.id) === dragId) return;
          card.classList.add('drag-over');
        });

        card.addEventListener('dragleave', () => {
          card.classList.remove('drag-over');
        });

        card.addEventListener('drop', async (e) => {
          e.preventDefault();
          const toId = Number(card.dataset.id);
          card.classList.remove('drag-over');
          reorderItems(dragId, toId);
          try {
            await saveItems();
            render();
          } catch {
            setEditorStatus('순서를 저장하지 못했습니다.', true);
          }
        });
      });
    }

    function render() {
      if (!items.length) {
        el.list.innerHTML = '<div class="empty">등록된 작품이 없습니다.</div>';
      } else {
        el.list.innerHTML = items.map(item => `
          <div class="item ${activeId === item.id ? 'active' : ''} ${isAdmin ? 'admin' : ''}" data-id="${item.id}">
            <div class="thumb">
              <button class="thumb-delete-btn" type="button" data-id="${item.id}">삭제</button>
              <img src="${item.poster || PLACEHOLDER}" alt="${(item.title || '').replace(/"/g, '&quot;')}" />
            </div>
            <div class="body">
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="meta">${escapeHtml(item.year || '')} · ${escapeHtml(item.role || '')} · ${escapeHtml(item.platform || '')}</div>
              <div class="desc">${escapeHtml(item.desc || '')}</div>
            </div>
          </div>
        `).join('');

        el.list.querySelectorAll('.thumb-delete-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isAdmin) return;
            const id = Number(btn.dataset.id);
            openDeleteModal(id);
          });
        });

        el.list.querySelectorAll('.item').forEach(card => {
          card.addEventListener('click', () => {
            const id = Number(card.dataset.id);
            const index = items.findIndex(v => v.id === id);
            if (index < 0) return;
            openDetailByIndex(index);
          });
        });

        attachDragHandlers();
      }

      if (isAdmin) {
        el.adminBtn.className = 'btn';
        el.adminBtn.textContent = '종료';
        el.adminBtn.setAttribute('aria-label', '관리자 모드 종료');
        el.adminBtn.setAttribute('title', '관리자 모드 종료');
      } else {
        el.adminBtn.className = 'btn icon-btn more-btn';
        el.adminBtn.textContent = '⋯';
        el.adminBtn.setAttribute('aria-label', '관리자 모드');
        el.adminBtn.setAttribute('title', '관리자 모드');
      }

      el.addBtn.style.display = isAdmin ? 'inline-flex' : 'none';
      el.changePinBtn.style.display = isAdmin ? 'inline-flex' : 'none';
    }

    el.adminBtn.addEventListener('click', () => {
      if (isAdmin) {
        isAdmin = false;
        saveAdminMode();
        closeEditor();
        closeDetail();
        render();
        return;
      }
      openPinModal();
    });

    el.pinConfirmBtn.addEventListener('click', () => {
      if (el.pinInput.value === adminPin) {
        isAdmin = true;
        saveAdminMode();
        closePinModal();
        render();
      } else {
        setPinStatus('비밀번호가 올바르지 않습니다.', true);
      }
    });

    el.pinCancelBtn.addEventListener('click', closePinModal);

    el.pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') el.pinConfirmBtn.click();
    });

    el.changePinBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      openChangePinModal();
    });

    el.changePinConfirmBtn.addEventListener('click', () => {
      const current = el.currentPinInput.value.trim();
      const next = el.newPinInput.value.trim();
      const confirmNext = el.newPinConfirmInput.value.trim();

      if (current !== adminPin) {
        setChangePinStatus('현재 비밀번호가 올바르지 않습니다.', true);
        return;
      }

      if (!/^\d{4}$/.test(next)) {
        setChangePinStatus('새 비밀번호는 4자리 숫자로 입력해 주세요.', true);
        return;
      }

      if (next !== confirmNext) {
        setChangePinStatus('새 비밀번호 확인이 일치하지 않습니다.', true);
        return;
      }

      adminPin = next;
      saveAdminPin();
      closeChangePinModal();
    });

    el.changePinCancelBtn.addEventListener('click', closeChangePinModal);

    el.addBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      resetEditorFields();
      el.editorTitle.textContent = '작품 추가';
      openEditor();
      setEditorStatus('새 작품을 추가합니다.');
      render();
    });

    el.cancelBtn.addEventListener('click', closeEditor);

    el.deleteConfirmBtn.addEventListener('click', async () => {
      if (!isAdmin || !pendingDeleteId) return;

      items = items.filter(v => v.id !== pendingDeleteId);

      try {
        await saveItems();
        if (editingId === pendingDeleteId) closeEditor();
        if (activeId === pendingDeleteId) {
          closeDetail();
          activeId = null;
        }
        closeDeleteModal();
        render();
      } catch (e) {
        setEditorStatus('삭제하지 못했습니다.', true);
      }
    });

    el.deleteCancelBtn.addEventListener('click', closeDeleteModal);

    el.poster.addEventListener('change', () => setEditorStatus(''));
    el.extras.addEventListener('change', () => setEditorStatus(''));

    el.saveBtn.addEventListener('click', async () => {
      const title = el.title.value.trim();

      if (!title) {
        setEditorStatus('작품명을 입력해 주세요.', true);
        return;
      }

      try {
        const existing = editingId ? items.find(v => v.id === editingId) : null;
        let poster = existing?.poster || PLACEHOLDER;
        let extras = Array.isArray(existing?.extras) ? [...existing.extras] : [];

        if (el.poster.files[0]) {
          const file = el.poster.files[0];
          poster = await compressImageFile(file, {
            maxWidth: 1000,
            maxHeight: 1500,
            quality: 0.76
          });
        }

        if (el.extras.files.length) {
          extras = await filesToDataURLs(el.extras.files, 2);
        }

        const payload = {
          id: editingId || Date.now(),
          title,
          year: el.year.value.trim(),
          role: el.role.value.trim(),
          platform: el.platform.value.trim(),
          poster,
          extras,
          desc: el.desc.value.trim()
        };

        if (editingId) {
          items = items.map(v => v.id === editingId ? payload : v);
        } else {
          items.unshift(payload);
        }

        await saveItems();
        clearFileInputs();
        closeEditor();
        render();
      } catch (e) {
        setEditorStatus('저장하지 못했습니다. 다시 시도해 주세요.', true);
      }
    });

    el.detailEditBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      const item = items[currentDetailIndex];
      if (!item) return;
      closeDetail();
      openEdit(item);
    });

    el.detailCloseBtn.addEventListener('click', closeDetail);

    el.imagePrevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = items[currentDetailIndex];
      if (!item) return;
      const images = getImageList(item);
      currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
      updateDetailImage(item);
    });

    el.imageNextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = items[currentDetailIndex];
      if (!item) return;
      const images = getImageList(item);
      currentImageIndex = (currentImageIndex + 1) % images.length;
      updateDetailImage(item);
    });

    el.workPrevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDetailByIndex(currentDetailIndex - 1);
    });

    el.workNextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDetailByIndex(currentDetailIndex + 1);
    });

    el.detailModal.addEventListener('click', (e) => {
      if (e.target === el.detailModal) closeDetail();
    });

    el.pinModal.addEventListener('click', (e) => {
      if (e.target === el.pinModal) closePinModal();
    });

    el.deleteModal.addEventListener('click', (e) => {
      if (e.target === el.deleteModal) closeDeleteModal();
    });

    el.changePinModal.addEventListener('click', (e) => {
      if (e.target === el.changePinModal) closeChangePinModal();
    });

    el.editorModal.addEventListener('click', (e) => {
      if (e.target === el.editorModal) closeEditor();
    });

    (async function init() {
      await loadItems();
      render();
    })();
  </script>
</body>
</html>
