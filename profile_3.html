<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 위젯</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --font-name: "Black Han Sans", sans-serif;
      --font-body: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      --font-summary: "Nanum Brush Script", cursive;
      --font-info: "Jua", sans-serif;
    }

    body {
      margin: 0;
      background: #fff;
      color: #222;
      font-family: var(--font-body);
    }

    button, input, textarea { font: inherit; }

    .page {
      max-width: 1240px;
      margin: 0;
      padding: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
    }

    .menu-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .menu-dot-btn {
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      border-radius: 999px;
    }

    .menu-dot-btn:hover {
      background: rgba(0,0,0,0.04);
      color: #222;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      display: none;
      min-width: 84px;
      padding: 6px;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      z-index: 10;
    }

    .menu-panel .btn { width: 100%; }

    .menu-wrap:hover .menu-panel,
    .menu-wrap:focus-within .menu-panel {
      display: block;
    }

    .btn {
      height: 38px;
      padding: 0 14px;
      border: 1px solid #cfd6d4;
      border-radius: 10px;
      background: #fff;
      color: #222;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      vertical-align: middle;
    }

    .btn.dark {
      background: #202223;
      border-color: #202223;
      color: #fff;
    }

    .btn.small {
      height: 34px;
      padding: 0 12px;
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 288px minmax(0, 1fr);
      gap: 32px;
      align-items: start;
    }

    .photo-wrap {
      width: 100%;
      max-width: 288px;
      height: 400px;
      overflow: hidden;
    }

    .photo-card {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 400px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, #d6e1df 0%, #c0d0ce 100%);
      box-shadow: inset 0 8px 26px rgba(255,255,255,0.35), 0 12px 24px rgba(0,0,0,0.06);
    }

    .photo-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .content {
      min-width: 0;
      padding-top: 0;
      display: block;
    }

    .name {
      margin: 0;
      font-family: var(--font-name);
      font-size: clamp(44px, 5.1vw, 74px);
      line-height: 1.02;
      font-weight: 400;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .summary {
      margin-top: 20px;
      max-width: 620px;
      font-size: 28px;
      line-height: 1.45;
      color: #4a4a4a;
      white-space: pre-wrap;
      word-break: keep-all;
      font-family: var(--font-summary);
      font-weight: 400;
      font-style: normal;
    }

    .divider {
      border: 0;
      border-top: 1px solid #d4d6d5;
      margin: 22px 0 12px;
    }

    .info-list {
      display: grid;
      gap: 10px;
      max-width: 620px;
    }

    .info-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      align-items: baseline;
      gap: 8px;
    }

    .label,
    .value {
      font-family: var(--font-info);
      font-style: normal;
    }

    .label {
      font-size: 20px;
      color: #3c3c3c;
      line-height: 1.35;
      font-weight: 400;
    }

    .value {
      font-size: 17px;
      color: #4e4e4e;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: keep-all;
      font-weight: 700;
    }

    .value.link a {
      color: #4e4e4e;
      text-decoration: none;
      border-bottom: 1px solid #cfd4d3;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.42);
      padding: 16px;
      z-index: 50;
    }

    .modal.active { display: flex; }

    .editor {
      width: min(720px, 100%);
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.16);
      max-height: calc(100vh - 32px);
      overflow: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .editor h2 {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      background: #fff;
      outline: none;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }

    .input { height: 42px; }

    .textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .hint {
      margin-top: 5px;
      font-size: 12px;
      color: #6d6d6d;
      line-height: 1.45;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }

    .status.error { color: #c62828; }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .photo-wrap {
        max-width: 288px;
        height: 400px;
      }

      .photo-card { min-height: 400px; }
      .summary { font-size: 15px; }
      .label { font-size: 18px; }
      .value { font-size: 16px; }

      .info-item {
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="menu-wrap">
        <button class="menu-dot-btn" type="button" aria-label="메뉴">⋯</button>
        <div class="menu-panel">
          <button id="editBtn" class="btn small dark" type="button">수정</button>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="photo-wrap">
        <div class="photo-card">
          <img id="photoImage" src="" alt="프로필 이미지" decoding="async" fetchpriority="high" />
        </div>
      </div>

      <div class="content">
        <div>
          <h1 id="nameText" class="name"></h1>
          <div id="summaryText" class="summary"></div>
          <hr class="divider" />
        </div>

        <div class="info-list">
          <div class="info-item">
            <div class="label">생년월일</div>
            <div id="birthText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">학력</div>
            <div id="educationText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">혈액형</div>
            <div id="bloodText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">MBTI</div>
            <div id="mbtiText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">Instagram</div>
            <div id="instagramText" class="value link"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editorModal" class="modal">
    <div class="editor">
      <h2>프로필 수정</h2>

      <div class="field">
        <label for="nameInput">이름</label>
        <input id="nameInput" class="input" type="text" placeholder="예: 홍길동" />
      </div>

      <div class="field">
        <label for="summaryInput">설명</label>
        <textarea id="summaryInput" class="textarea" placeholder="이름 아래 들어갈 설명을 적어 주세요."></textarea>
      </div>

      <div class="field">
        <label for="birthInput">생년월일</label>
        <input id="birthInput" class="input" type="text" placeholder="예: 1992.07.16" />
      </div>

      <div class="field">
        <label for="educationInput">학력</label>
        <textarea id="educationInput" class="textarea" placeholder="예: 서울예대 연기과"></textarea>
      </div>

      <div class="field">
        <label for="bloodInput">혈액형</label>
        <input id="bloodInput" class="input" type="text" placeholder="예: AB형" />
      </div>

      <div class="field">
        <label for="mbtiInput">MBTI</label>
        <input id="mbtiInput" class="input" type="text" placeholder="예: ENFP" />
      </div>

      <div class="field">
        <label for="instagramInput">인스타그램 링크</label>
        <input id="instagramInput" class="input" type="text" placeholder="예: https://instagram.com/hs_1004_" />
      </div>

      <div class="field">
        <label for="mainPhotoInput">프로필 이미지</label>
        <input id="mainPhotoInput" class="input" type="file" accept="image/*" />
        <div class="hint">이미지는 자동 압축 후 저장됩니다.</div>
      </div>

      <div class="editor-actions">
        <button id="saveBtn" class="btn dark" type="button">저장</button>
        <button id="closeBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="statusText" class="status"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUq_JpxJVnJXH4NRuQ3k6vCRT3ZbAew0dpS_WyaevVwM_PcAalWiLKRCC48ry44SqG/exec';
    const PROFILE_ID = 'profile_001';
    const PROFILE_CACHE_KEY = 'profile_widget_cache_v3';

    const defaultState = {
      id: 'profile_001',
      name: '박형석',
      summary: `안녕하세요.
여행과 연기를 사랑하는 #ACTRAVELLER 박형석입니다.`,
      birth: '1992.07.16',
      education: '서울예대 연기과',
      blood: 'AB형',
      mbti: 'ENFP',
      instagram: 'https://instagram.com/hs_1004_',
      photo: 'https://lh3.googleusercontent.com/d/1bESJ_eEcS_VuhAnoup5FmuoVbXJyEMOM'
    };

    const PLACEHOLDER = defaultState.photo || 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#d7e2df"/>' +
      '<stop offset="100%" stop-color="#bfd0cd"/>' +
      '</linearGradient></defs>' +
      '<rect width="800" height="1100" fill="url(#g)"/>' +
      '<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#6f7c7a" font-size="44" font-family="sans-serif">PROFILE IMAGE</text>' +
      '</svg>'
    );

    const el = {
      editBtn: document.getElementById('editBtn'),
      photoImage: document.getElementById('photoImage'),
      nameText: document.getElementById('nameText'),
      summaryText: document.getElementById('summaryText'),
      birthText: document.getElementById('birthText'),
      educationText: document.getElementById('educationText'),
      bloodText: document.getElementById('bloodText'),
      mbtiText: document.getElementById('mbtiText'),
      instagramText: document.getElementById('instagramText'),
      editorModal: document.getElementById('editorModal'),
      nameInput: document.getElementById('nameInput'),
      summaryInput: document.getElementById('summaryInput'),
      birthInput: document.getElementById('birthInput'),
      educationInput: document.getElementById('educationInput'),
      bloodInput: document.getElementById('bloodInput'),
      mbtiInput: document.getElementById('mbtiInput'),
      instagramInput: document.getElementById('instagramInput'),
      mainPhotoInput: document.getElementById('mainPhotoInput'),
      saveBtn: document.getElementById('saveBtn'),
      closeBtn: document.getElementById('closeBtn'),
      statusText: document.getElementById('statusText')
    };

    let state = { ...defaultState };

    function setStatus(text = '', isError = false) {
      el.statusText.textContent = text;
      el.statusText.classList.toggle('error', !!isError);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeProfileData(data) {
      return {
        id: data?.id ? String(data.id).trim() : defaultState.id,
        name: data?.name ? String(data.name).trim() : defaultState.name,
        summary: data?.summary ? String(data.summary).trim() : defaultState.summary,
        birth: data?.birth ? String(data.birth).trim() : defaultState.birth,
        education: data?.education ? String(data.education).trim() : defaultState.education,
        blood: data?.blood ? String(data.blood).trim() : defaultState.blood,
        mbti: data?.mbti ? String(data.mbti).trim() : defaultState.mbti,
        instagram: data?.instagram ? String(data.instagram).trim() : defaultState.instagram,
        photo: data?.photo ? String(data.photo).trim() : defaultState.photo
      };
    }

    function saveProfileCache(data) {
      try {
        localStorage.setItem(PROFILE_CACHE_KEY, JSON.stringify(data));
      } catch (e) {}
    }

    function loadProfileCache() {
      try {
        const raw = localStorage.getItem(PROFILE_CACHE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function render() {
      el.photoImage.onerror = () => {
        el.photoImage.onerror = null;
        el.photoImage.src = PLACEHOLDER;
      };

      el.photoImage.src = state.photo || PLACEHOLDER;
      el.nameText.textContent = state.name || '';
      el.summaryText.textContent = state.summary || '';
      el.birthText.textContent = state.birth || '';
      el.educationText.textContent = state.education || '';
      el.bloodText.textContent = state.blood || '';
      el.mbtiText.textContent = state.mbti || '';

      if (state.instagram) {
        const safeText = escapeHtml(state.instagram);
        const href = /^(https?:)?\/\//i.test(state.instagram) ? state.instagram : `https://${state.instagram}`;
        const safeHref = escapeHtml(href);
        el.instagramText.innerHTML = `<a href="${safeHref}" target="_blank" rel="noopener noreferrer">${safeText}</a>`;
      } else {
        el.instagramText.textContent = '';
      }
    }

    function fillEditor() {
      el.nameInput.value = state.name || '';
      el.summaryInput.value = state.summary || '';
      el.birthInput.value = state.birth || '';
      el.educationInput.value = state.education || '';
      el.bloodInput.value = state.blood || '';
      el.mbtiInput.value = state.mbti || '';
      el.instagramInput.value = state.instagram || '';
      el.mainPhotoInput.value = '';
      setStatus('');
    }

    async function fetchProfile() {
      const url = `${APPS_SCRIPT_URL}?id=${encodeURIComponent(PROFILE_ID)}`;
      const response = await fetch(url, {
        method: 'GET',
        cache: 'no-store'
      });

      if (!response.ok) {
        throw new Error('프로필 데이터를 불러오지 못했습니다.');
      }

      const result = await response.json();

      if (Array.isArray(result)) {
        const found = result.find(item => String(item.id || '').trim() === PROFILE_ID) || result[0];
        return normalizeProfileData(found || defaultState);
      }

      if (result && typeof result === 'object' && result.success !== undefined) {
        if (!result.success) {
          throw new Error(result.message || '프로필 데이터를 불러오지 못했습니다.');
        }
        return normalizeProfileData(result.data || defaultState);
      }

      return normalizeProfileData(result || defaultState);
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('이미지를 읽지 못했습니다.'));
          img.src = reader.result;
        };

        reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
        reader.readAsDataURL(file);
      });
    }

    async function compressImageFile(file, options = {}) {
      const {
        maxWidth = 900,
        maxHeight = 1200,
        quality = 0.72,
        mimeType = 'image/jpeg'
      } = options;

      const img = await loadImageFromFile(file);

      let width = img.width;
      let height = img.height;
      const ratio = Math.min(maxWidth / width, maxHeight / height, 1);

      width = Math.max(1, Math.round(width * ratio));
      height = Math.max(1, Math.round(height * ratio));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);

      let output = canvas.toDataURL(mimeType, quality);

      if (output.length > 650000) {
        output = canvas.toDataURL(mimeType, 0.62);
      }

      if (output.length > 500000) {
        const canvas2 = document.createElement('canvas');
        canvas2.width = Math.max(1, Math.round(width * 0.88));
        canvas2.height = Math.max(1, Math.round(height * 0.88));

        const ctx2 = canvas2.getContext('2d', { alpha: false });
        ctx2.fillStyle = '#ffffff';
        ctx2.fillRect(0, 0, canvas2.width, canvas2.height);
        ctx2.drawImage(canvas, 0, 0, canvas2.width, canvas2.height);

        output = canvas2.toDataURL(mimeType, 0.58);
      }

      return output;
    }

    async function saveProfile(payload) {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error('프로필 저장 요청에 실패했습니다.');
      }

      const result = await response.json();

      if (result && typeof result === 'object' && result.success !== undefined) {
        if (!result.success) {
          throw new Error(result.message || '프로필 저장에 실패했습니다.');
        }
        return normalizeProfileData(result.data || payload);
      }

      return normalizeProfileData(result || payload);
    }

    async function init() {
      const cached = loadProfileCache();

      if (cached) {
        state = normalizeProfileData(cached);
        render();
      } else {
        state = { ...defaultState };
        render();
      }

      try {
        const latest = await fetchProfile();
        state = latest;
        render();
        saveProfileCache(state);
      } catch (error) {
        console.error(error);
      }
    }

    el.editBtn.addEventListener('click', () => {
      fillEditor();
      el.editorModal.classList.add('active');
    });

    el.closeBtn.addEventListener('click', () => {
      el.editorModal.classList.remove('active');
      setStatus('');
    });

    el.editorModal.addEventListener('click', (e) => {
      if (e.target === el.editorModal) {
        el.editorModal.classList.remove('active');
        setStatus('');
      }
    });

    el.mainPhotoInput.addEventListener('change', () => {
      setStatus('');
    });

    el.saveBtn.addEventListener('click', async () => {
      const name = el.nameInput.value.trim();

      if (!name) {
        setStatus('이름을 입력해 주세요.', true);
        return;
      }

      try {
        el.saveBtn.disabled = true;
        setStatus('저장 중...');

        const nextState = {
          id: PROFILE_ID,
          name,
          summary: el.summaryInput.value.trim(),
          birth: el.birthInput.value.trim(),
          education: el.educationInput.value.trim(),
          blood: el.bloodInput.value.trim(),
          mbti: el.mbtiInput.value.trim(),
          instagram: el.instagramInput.value.trim(),
          photo: state.photo || PLACEHOLDER
        };

        if (el.mainPhotoInput.files[0]) {
          nextState.photo = await compressImageFile(el.mainPhotoInput.files[0], {
            maxWidth: 900,
            maxHeight: 1200,
            quality: 0.72
          });
        }

        state = await saveProfile(nextState);
        saveProfileCache(state);
        render();
        el.editorModal.classList.remove('active');
        setStatus('');
      } catch (error) {
        console.error(error);
        setStatus(error.message || '저장하지 못했습니다. 다시 시도해 주세요.', true);
      } finally {
        el.saveBtn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
