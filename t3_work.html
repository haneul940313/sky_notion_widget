<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배우 작품활동 위젯</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111;
      background: #fff;
    }
    button, input, textarea { font: inherit; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      text-align: left;
    }
    .btn {
      height: 36px;
      padding: 0 14px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }
    .btn.dark {
      background: #111;
      border-color: #111;
      color: #fff;
    }
    .btn.danger {
      color: #b42318;
      border-color: #efc0c0;
      background: #fff;
    }
    .form {
      display: none;
      border: 1px solid #e8e8ed;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .form.active {
      display: block;
    }
    .field {
      margin-bottom: 10px;
    }
    .field label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: #444;
    }
    .input, .textarea {
      width: 100%;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
    }
    .input {
      height: 38px;
      padding: 0 12px;
    }
    .textarea {
      min-height: 90px;
      resize: vertical;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }
    .status.error {
      color: #c62828;
    }
    .list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .item {
      border: 1px solid #e8e8ed;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    .item:hover {
      transform: translateY(-1px);
    }
    .item.active {
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(17,17,17,0.08);
    }
    .thumb {
      aspect-ratio: 2 / 3;
      background: #ececf1;
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .body {
      padding: 10px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 12px;
      color: #444;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 54px;
    }
    .empty {
      border: 1px dashed #d9d9de;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #777;
    }
    @media (max-width: 760px) {
      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>배우 작품활동</h1>
    <button id="addBtn" class="btn dark" type="button">추가</button>
  </div>

  <div id="form" class="form">
    <div class="field">
      <label for="title">작품명</label>
      <input id="title" class="input" type="text" />
    </div>
    <div class="field">
      <label for="year">공개일 / 연도</label>
      <input id="year" class="input" type="text" />
    </div>
    <div class="field">
      <label for="role">역할</label>
      <input id="role" class="input" type="text" />
    </div>
    <div class="field">
      <label for="platform">플랫폼 / 구분</label>
      <input id="platform" class="input" type="text" />
    </div>
    <div class="field">
      <label for="poster">대표 포스터 업로드</label>
      <input id="poster" class="input" type="file" accept="image/*" />
    </div>
    <div class="field">
      <label for="extras">추가 이미지 업로드</label>
      <input id="extras" class="input" type="file" accept="image/*" multiple />
    </div>
    <div class="field">
      <label for="desc">설명</label>
      <textarea id="desc" class="textarea"></textarea>
    </div>
    <div class="actions">
      <button id="saveBtn" class="btn dark" type="button">저장</button>
      <button id="deleteBtn" class="btn danger" type="button">삭제</button>
      <button id="cancelBtn" class="btn" type="button">닫기</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div id="list" class="list"></div>

  <script>
    const WIDGET_ID = 'actor_widget_embed_001';
    const STORAGE_KEY = `actor_widget_embed_data_${WIDGET_ID}`;
    const PLACEHOLDER =
      'data:image/svg+xml;utf8,' +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
          <rect width="400" height="600" fill="#ececf1"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#9a9aa3" font-size="24" font-family="sans-serif">NO IMAGE</text>
        </svg>
      `);

    const seedData = [
      {
        id: Date.now(),
        title: '샘플 작품',
        year: '2026',
        role: '주연',
        platform: '드라마',
        poster: PLACEHOLDER,
        extras: [],
        desc: '여기에 작품 소개를 적으면 됩니다.'
      }
    ];

    const el = {
      addBtn: document.getElementById('addBtn'),
      form: document.getElementById('form'),
      title: document.getElementById('title'),
      year: document.getElementById('year'),
      role: document.getElementById('role'),
      platform: document.getElementById('platform'),
      poster: document.getElementById('poster'),
      extras: document.getElementById('extras'),
      desc: document.getElementById('desc'),
      saveBtn: document.getElementById('saveBtn'),
      deleteBtn: document.getElementById('deleteBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      status: document.getElementById('status'),
      list: document.getElementById('list')
    };

    let items = [];
    let editingId = null;
    let activeId = null;

    function setStatus(text = '', isError = false) {
      el.status.textContent = text;
      el.status.classList.toggle('error', !!isError);
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        items = Array.isArray(parsed) && parsed.length ? parsed : seedData;
      } catch (e) {
        items = seedData;
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function openForm() {
      el.form.classList.add('active');
    }

    function closeForm() {
      el.form.classList.remove('active');
      editingId = null;
      activeId = null;
      el.title.value = '';
      el.year.value = '';
      el.role.value = '';
      el.platform.value = '';
      el.poster.value = '';
      el.extras.value = '';
      el.desc.value = '';
      el.deleteBtn.style.display = 'none';
      setStatus('');
      render();
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function filesToDataURLs(fileList, limit) {
      const files = Array.from(fileList || []).slice(0, limit);
      const results = [];
      for (const file of files) {
        results.push(await fileToDataURL(file));
      }
      return results;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function openEdit(item) {
      editingId = item.id;
      activeId = item.id;
      el.title.value = item.title || '';
      el.year.value = item.year || '';
      el.role.value = item.role || '';
      el.platform.value = item.platform || '';
      el.poster.value = '';
      el.extras.value = '';
      el.desc.value = item.desc || '';
      el.deleteBtn.style.display = 'inline-flex';
      openForm();
      setStatus('기존 이미지는 새 파일을 올리지 않으면 유지됩니다.');
      render();
    }

    function render() {
      if (!items.length) {
        el.list.innerHTML = '<div class="empty">등록된 작품이 없습니다.</div>';
        return;
      }

      el.list.innerHTML = items.map(item => `
        <div class="item ${activeId === item.id ? 'active' : ''}" data-id="${item.id}">
          <div class="thumb">
            <img src="${item.poster || PLACEHOLDER}" alt="${(item.title || '').replace(/"/g, '&quot;')}" />
          </div>
          <div class="body">
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="meta">${escapeHtml(item.year || '')} · ${escapeHtml(item.role || '')} · ${escapeHtml(item.platform || '')}</div>
            <div class="desc">${escapeHtml(item.desc || '')}</div>
          </div>
        </div>
      `).join('');

      el.list.querySelectorAll('.item').forEach(card => {
        card.addEventListener('click', () => {
          const id = Number(card.dataset.id);
          const item = items.find(v => v.id === id);
          if (!item) return;
          openEdit(item);
        });
      });
    }

    el.addBtn.addEventListener('click', () => {
      editingId = null;
      activeId = null;
      el.deleteBtn.style.display = 'none';
      openForm();
      setStatus('새 작품을 추가합니다.');
      render();
    });

    el.cancelBtn.addEventListener('click', () => {
      closeForm();
    });

    el.deleteBtn.addEventListener('click', () => {
      if (!editingId) return;
      const ok = window.confirm('이 작품을 삭제하시겠습니까?');
      if (!ok) return;
      items = items.filter(v => v.id !== editingId);
      saveItems();
      closeForm();
      render();
    });

    el.saveBtn.addEventListener('click', async () => {
      const title = el.title.value.trim();
      if (!title) {
        setStatus('작품명을 입력해 주세요.', true);
        return;
      }

      try {
        const existing = editingId ? items.find(v => v.id === editingId) : null;
        let poster = existing?.poster || PLACEHOLDER;
        let extras = Array.isArray(existing?.extras) ? [...existing.extras] : [];

        if (el.poster.files[0]) {
          poster = await fileToDataURL(el.poster.files[0]);
        }

        if (el.extras.files.length) {
          extras = await filesToDataURLs(el.extras.files, 2);
        }

        const payload = {
          id: editingId || Date.now(),
          title,
          year: el.year.value.trim(),
          role: el.role.value.trim(),
          platform: el.platform.value.trim(),
          poster,
          extras,
          desc: el.desc.value.trim()
        };

        if (editingId) {
          items = items.map(v => v.id === editingId ? payload : v);
        } else {
          items.unshift(payload);
        }

        saveItems();
        closeForm();
        render();
      } catch (e) {
        setStatus('저장하지 못했습니다. 이미지 크기를 줄여 주세요.', true);
      }
    });

    loadItems();
    el.deleteBtn.style.display = 'none';
    render();
    setStatus('카드를 누르면 수정 폼이 열리고, 폼 안에서 삭제할 수 있습니다.');
  </script>
</body>
</html>
