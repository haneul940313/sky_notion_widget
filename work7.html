<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>배우 작품활동 위젯</title>
<style>
/* 전체 디자인 유지 */
* { box-sizing: border-box; }
body { margin:0; padding:16px; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; color:#111; background:#fff; }
button,input,textarea{ font:inherit; }
.topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px;}
h1{ margin:0; font-size:22px; line-height:1.2; text-align:left;}
.top-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.btn{ height:36px; padding:0 14px; border:1px solid #d9d9de; border-radius:10px; background:#fff; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; line-height:1; vertical-align:middle;}
.btn.dark{ background:#111; border-color:#111; color:#fff;}
.btn.danger{ color:#b42318; border-color:#efc0c0; background:#fff;}
.btn.small{ height:32px; padding:0 10px; font-size:12px;}
.status-bar{ display:none;}
.list-viewport{ width:100%; overflow-x:auto; overflow-y:hidden; padding-bottom:6px; -webkit-overflow-scrolling:touch; scrollbar-width:thin;}
.list{ display:flex; gap:12px; align-items:stretch; min-width:100%;}
.item{ position:relative; flex:0 0 calc((100%-48px)/5); min-width:180px; border:1px solid #e8e8ed; border-radius:14px; overflow:hidden; background:#fff; cursor:pointer; transition:border-color .15s ease,box-shadow .15s ease,transform .15s ease,opacity .15s ease;}
.item:hover{ transform:translateY(-1px);}
.item.active{ border-color:#111; box-shadow:0 0 0 2px rgba(17,17,17,0.08);}
.item.admin{ cursor:grab;}
.item.dragging{ opacity:0.45;}
.item.drag-over{ border-color:#111; box-shadow:0 0 0 2px rgba(17,17,17,0.14);}
.thumb{ position:relative; aspect-ratio:2/3; background:#ececf1; overflow:hidden;}
.thumb img{ width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;}
.thumb-delete-btn{ position:absolute; top:10px; right:10px; z-index:2; display:none; align-items:center; justify-content:center; min-width:52px; height:32px; padding:0 10px; border:0; border-radius:999px; background:rgba(17,17,17,0.88); color:#fff; font-size:12px; cursor:pointer; line-height:1;}
.item.admin .thumb-delete-btn{ display:inline-flex;}
.body{ padding:10px;}
.title{ font-size:14px; font-weight:700; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.meta{ font-size:12px; color:#666; margin-bottom:10px;}
.desc{ display:none;}
.empty{ width:100%; border:1px dashed #d9d9de; border-radius:14px; padding:24px; text-align:center; color:#777;}
/* 모달 스타일 */
.modal{ display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.5);}
.modal-content{ background:#fff; margin:10% auto; padding:20px; border-radius:14px; width:90%; max-width:500px; position:relative;}
.modal-content h2{margin-top:0;}
.modal-close{ position:absolute; top:10px; right:10px; cursor:pointer; font-weight:bold; font-size:18px;}
input,textarea{ width:100%; margin-bottom:12px; padding:8px; border:1px solid #ccc; border-radius:6px;}
</style>
</head>
<body>
<div class="topbar">
  <h1>배우 작품활동</h1>
  <div class="top-actions">
    <button id="adminBtn" class="btn">관리자 모드</button>
    <button id="addBtn" class="btn dark" style="display:none;">추가</button>
  </div>
</div>

<div id="pageStatus" class="status-bar"></div>
<div class="list-viewport">
  <div id="list" class="list"></div>
</div>

<!-- 디테일 모달 -->
<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal('detailModal')">&times;</span>
    <h2 id="detailTitle"></h2>
    <p id="detailMeta"></p>
    <img id="detailImg" style="width:100%; margin-bottom:12px;" />
    <p id="detailDesc"></p>
    <button id="editBtn" class="btn dark" style="display:none;">편집</button>
    <button id="deleteBtn" class="btn danger" style="display:none;">삭제</button>
  </div>
</div>

<!-- 편집 모달 -->
<div id="editorModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal('editorModal')">&times;</span>
    <h2>작품 편집</h2>
    <input type="text" id="editTitle" placeholder="제목"/>
    <input type="text" id="editYear" placeholder="연도"/>
    <input type="text" id="editRole" placeholder="역할"/>
    <input type="text" id="editPlatform" placeholder="플랫폼"/>
    <input type="file" id="editPoster"/>
    <button id="saveEditBtn" class="btn dark">저장</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
const PLACEHOLDER = 'data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600"><rect width="400" height="600" fill="#ececf1"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#9a9aa3" font-size="24">NO IMAGE</text></svg>');

let items = [];
let isAdmin = false;
let activeItem = null;

// 엘리먼트
const el = {
  list: document.getElementById('list'),
  addBtn: document.getElementById('addBtn'),
  adminBtn: document.getElementById('adminBtn'),
  detailModal: document.getElementById('detailModal'),
  editorModal: document.getElementById('editorModal'),
  editTitle: document.getElementById('editTitle'),
  editYear: document.getElementById('editYear'),
  editRole: document.getElementById('editRole'),
  editPlatform: document.getElementById('editPlatform'),
  editPoster: document.getElementById('editPoster'),
  saveEditBtn: document.getElementById('saveEditBtn'),
  editBtn: document.getElementById('editBtn'),
  deleteBtn: document.getElementById('deleteBtn'),
  detailTitle: document.getElementById('detailTitle'),
  detailMeta: document.getElementById('detailMeta'),
  detailImg: document.getElementById('detailImg'),
  detailDesc: document.getElementById('detailDesc')
};

// 서버에서 데이터 불러오기
async function loadItems(){
  try{
    const res = await fetch(`${API_URL}?action=get`);
    const data = await res.json();
    items = Array.isArray(data)?data:[];
    render();
  }catch(e){
    console.error(e);
    items = [];
    render();
  }
}

// 렌더링
function render(){
  if(!items.length){
    el.list.innerHTML='<div class="empty">등록된 작품이 없습니다.</div>';
    return;
  }
  el.list.innerHTML = items.map(item=>`
    <div class="item" data-id="${item.id}">
      <div class="thumb"><img src="${item.poster||PLACEHOLDER}" /></div>
      <div class="body">
        <div class="title">${item.title||''}</div>
        <div class="meta">${item.year||''} · ${item.role||''} · ${item.platform||''}</div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.item').forEach(it=>{
    it.addEventListener('click', ()=>openDetail(it.dataset.id));
  });
}

// 모달 열기/닫기
function openModal(modal){ modal.style.display='block'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

// 디테일 열기
function openDetail(id){
  const item = items.find(i=>i.id==id);
  if(!item) return;
  activeItem=item;
  el.detailTitle.textContent=item.title;
  el.detailMeta.textContent=`${item.year} · ${item.role} · ${item.platform}`;
  el.detailImg.src=item.poster||PLACEHOLDER;
  el.detailDesc.textContent=item.desc||'';
  if(isAdmin){
    el.editBtn.style.display='inline-flex';
    el.deleteBtn.style.display='inline-flex';
  }
  openModal(el.detailModal);
}

// 편집 열기
function openEditor(item){
  el.editTitle.value=item.title||'';
  el.editYear.value=item.year||'';
  el.editRole.value=item.role||'';
  el.editPlatform.value=item.platform||'';
  el.editPoster.value='';
  openModal(el.editorModal);
}

// 저장
async function saveEdit(){
  if(!activeItem) return;
  const formData = new FormData();
  formData.append('action','update');
  formData.append('id',activeItem.id);
  formData.append('title',el.editTitle.value);
  formData.append('year',el.editYear.value);
  formData.append('role',el.editRole.value);
  formData.append('platform',el.editPlatform.value);
  if(el.editPoster.files[0]) formData.append('poster',el.editPoster.files[0]);

  try{
    const res = await fetch(API_URL,{method:'POST',body:formData});
    const data = await res.json();
    items = data;
    render();
    closeModal('editorModal');
    closeModal('detailModal');
  }catch(e){ console.error(e); }
}

// 삭제
async function deleteItem(){
  if(!activeItem) return;
  if(!confirm('정말 삭제하시겠습니까?')) return;
  try{
    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'delete',id:activeItem.id})
    });
    const data = await res.json();
    items = data;
    render();
    closeModal('detailModal');
  }catch(e){ console.error(e); }
}

// 추가
async function addItem(){
  const newItem={ id:Date.now(), title:'새 작품', year:'2026', role:'주연', platform:'드라마', poster:PLACEHOLDER };
  try{
    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'add',item:newItem})
    });
    const data = await res.json();
    items=data;
    render();
  }catch(e){ console.error(e); }
}

// 관리자 토글
el.adminBtn.addEventListener('click',()=>{
  isAdmin=!isAdmin;
  el.addBtn.style.display=isAdmin?'inline-flex':'none';
  render();
});

// 이벤트 연결
el.addBtn.addEventListener('click', addItem);
el.editBtn.addEventListener('click', ()=>{ openEditor(activeItem); });
el.saveEditBtn.addEventListener('click', saveEdit);
el.deleteBtn.addEventListener('click', deleteItem);

// 초기 로드
window.addEventListener('load', loadItems);
</script>
</body>
</html>
