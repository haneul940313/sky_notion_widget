<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 위젯</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
  </style>
  <style>
    * { box-sizing: border-box; }

    :root {
      --font-name: "Black Han Sans", sans-serif;
      --font-body: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      --font-summary: "Nanum Brush Script", cursive;
      --font-info: "Jua", sans-serif;
    }

    body {
      margin: 0;
      background: #fff;
      color: #222;
      font-family: var(--font-body);
    }

    button, input, textarea { font: inherit; }

    .page {
      max-width: 1240px;
      margin: 0;
      padding: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
    }

    .menu-wrap {
      position: relative;
      display: inline-block;
    }

    .menu-dot-btn {
      list-style: none;
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      border-radius: 999px;
      user-select: none;
    }

    .menu-dot-btn::-webkit-details-marker { display: none; }
    .menu-dot-btn::marker { content: ''; }

    .menu-dot-btn:hover {
      background: rgba(0,0,0,0.04);
      color: #222;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      display: none;
      min-width: 110px;
      padding: 6px;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      z-index: 10;
    }

    .menu-panel .btn {
      width: 100%;
      margin-top: 4px;
    }
    .menu-panel .btn:first-child { margin-top: 0; }
    .menu-wrap[open] .menu-panel { display: block; }

    .btn {
      height: 38px;
      padding: 0 14px;
      border: 1px solid #cfd6d4;
      border-radius: 10px;
      background: #fff;
      color: #222;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      vertical-align: middle;
    }

    .btn.dark {
      background: #202223;
      border-color: #202223;
      color: #fff;
    }

    .btn.small {
      height: 34px;
      padding: 0 12px;
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 288px minmax(0, 1fr);
      gap: 32px;
      align-items: start;
    }

    .photo-wrap {
      width: 100%;
      max-width: 288px;
      height: 400px;
      overflow: hidden;
    }

    .photo-card {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 400px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, #d6e1df 0%, #c0d0ce 100%);
      box-shadow: inset 0 8px 26px rgba(255,255,255,0.35), 0 12px 24px rgba(0,0,0,0.06);
    }

    .photo-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .content {
      min-width: 0;
      padding-top: 0;
      display: block;
    }

    .name {
      margin: 0;
      font-family: var(--font-name);
      font-size: clamp(44px, 5.1vw, 74px);
      line-height: 1.02;
      font-weight: 400;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .summary {
      margin-top: 20px;
      max-width: 620px;
      font-size: 28px;
      line-height: 1.45;
      color: #4a4a4a;
      white-space: pre-wrap;
      word-break: keep-all;
      font-family: var(--font-summary);
      font-weight: 400;
      font-style: normal;
    }

    .divider {
      border: 0;
      border-top: 1px solid #d4d6d5;
      margin: 22px 0 12px;
    }

    .info-list {
      display: grid;
      gap: 10px;
      max-width: 620px;
    }

    .info-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      align-items: baseline;
      gap: 8px;
    }

    .label,
    .value {
      font-family: var(--font-info);
      font-style: normal;
    }

    .label {
      font-size: 20px;
      color: #3c3c3c;
      line-height: 1.35;
      font-weight: 400;
    }

    .value {
      font-size: 17px;
      color: #4e4e4e;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: keep-all;
      font-weight: 700;
    }

    .value.link a {
      color: #4e4e4e;
      text-decoration: none;
      border-bottom: 1px solid #cfd4d3;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.42);
      padding: 16px;
      z-index: 50;
    }

    .modal.active { display: flex; }

    .editor {
      width: min(720px, 100%);
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.16);
      max-height: calc(100vh - 32px);
      overflow: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .editor h2 {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      background: #fff;
      outline: none;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }

    .input { height: 42px; }

    .textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .hint {
      margin-top: 5px;
      font-size: 12px;
      color: #6d6d6d;
      line-height: 1.45;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }

    .status.success { color: #0b7a35; }
    .status.error { color: #c62828; }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .photo-wrap {
        max-width: 288px;
        height: 400px;
      }

      .photo-card { min-height: 400px; }
      .summary { font-size: 15px; }
      .label { font-size: 18px; }
      .value { font-size: 16px; }

      .info-item {
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <details class="menu-wrap" id="menuWrap">
        <summary id="menuToggleBtn" class="menu-dot-btn" aria-label="메뉴">⋯</summary>
        <div class="menu-panel">
          <button id="editBtn" class="btn small dark" type="button">수정</button>
          <button id="exportBtn" class="btn small" type="button">배포용 저장</button>
        </div>
      </details>
    </div>

    <div class="layout">
      <div class="photo-wrap">
        <div class="photo-card">
          <img id="photoImage" src="" alt="프로필 이미지" />
        </div>
      </div>

      <div class="content">
        <div>
          <h1 id="nameText" class="name"></h1>
          <div id="summaryText" class="summary"></div>
          <hr class="divider" />
        </div>

        <div class="info-list">
          <div class="info-item">
            <div class="label">생년월일</div>
            <div id="birthText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">학력</div>
            <div id="educationText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">혈액형</div>
            <div id="bloodText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">MBTI</div>
            <div id="mbtiText" class="value"></div>
          </div>
          <div class="info-item">
            <div class="label">Instagram</div>
            <div id="instagramText" class="value link"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editorModal" class="modal">
    <div class="editor">
      <h2>프로필 수정</h2>

      <div class="field">
        <label for="nameInput">이름</label>
        <input id="nameInput" class="input" type="text" placeholder="예: 홍길동" />
      </div>

      <div class="field">
        <label for="summaryInput">설명</label>
        <textarea id="summaryInput" class="textarea" placeholder="이름 아래 들어갈 설명을 적어 주세요."></textarea>
      </div>

      <div class="field">
        <label for="birthInput">생년월일</label>
        <input id="birthInput" class="input" type="text" placeholder="예: 1994.08.14" />
      </div>

      <div class="field">
        <label for="educationInput">학력</label>
        <textarea id="educationInput" class="textarea" placeholder="예: ○○대학교 연극영화과 졸업"></textarea>
      </div>

      <div class="field">
        <label for="bloodInput">혈액형</label>
        <input id="bloodInput" class="input" type="text" placeholder="예: A형" />
      </div>

      <div class="field">
        <label for="mbtiInput">MBTI</label>
        <input id="mbtiInput" class="input" type="text" placeholder="예: ENFP" />
      </div>

      <div class="field">
        <label for="instagramInput">인스타그램 링크</label>
        <input id="instagramInput" class="input" type="text" placeholder="예: https://instagram.com/username" />
      </div>

      <div class="field">
        <label for="mainPhotoInput">프로필 이미지</label>
        <input id="mainPhotoInput" class="input" type="file" accept="image/*" />
        <div class="hint">이미지는 자동 압축 후 저장됩니다.</div>
      </div>

      <div class="editor-actions">
        <button id="saveBtn" class="btn dark" type="button">저장</button>
        <button id="closeBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="statusText" class="status"></div>
    </div>
  </div>

  <script>
    const DB_NAME = 'profile_widget_indexeddb_v1';
    const STORE_NAME = 'state';
    const STATE_KEY = 'profile';

    const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#d7e2df"/>' +
      '<stop offset="100%" stop-color="#bfd0cd"/>' +
      '</linearGradient></defs>' +
      '<rect width="800" height="1100" fill="url(#g)"/>' +
      '<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#6f7c7a" font-size="44" font-family="sans-serif">PROFILE IMAGE</text>' +
      '</svg>'
    );

    const defaultState = {
      name: '홍길동',
      summary: `이름 아래 들어갈 설명을 적는 영역입니다.\n원하시는 소개 문구로 자유롭게 수정할 수 있습니다.`,
      birth: '1994.08.14',
      education: '예시 학력을 입력해 주세요.',
      blood: 'A형',
      mbti: 'ENFP',
      instagram: '',
      photo: PLACEHOLDER
    };

      editBtn: document.getElementById('editBtn'),
      exportBtn: document.getElementById('exportBtn'),
      photoImage: document.getElementById('photoImage'),
      nameText: document.getElementById('nameText'),
      summaryText: document.getElementById('summaryText'),
      birthText: document.getElementById('birthText'),
      educationText: document.getElementById('educationText'),
      bloodText: document.getElementById('bloodText'),
      mbtiText: document.getElementById('mbtiText'),

      mainPhotoInput: document.getElementById('mainPhotoInput'),
      saveBtn: document.getElementById('saveBtn'),
      closeBtn: document.getElementById('closeBtn'),
      statusText: document.getElementById('statusText')
    };

    let db = null;
    let state = { ...defaultState };

    function setStatus(text = '', type = '') {
      el.statusText.textContent = text;
      el.statusText.classList.remove('error', 'success');
      if (type) el.statusText.classList.add(type);
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: 'key' });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function dbGetState() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(STATE_KEY);
        request.onsuccess = () => resolve(request.result ? request.result.value : null);
        request.onerror = () => reject(request.error);
      });
    }

    function dbSaveState() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ key: STATE_KEY, value: state });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function compressImageFile(file, options = {}) {
      const {
        maxWidth = 1100,
        maxHeight = 1500,
        quality = 0.78,
        mimeType = 'image/jpeg'
      } = options;

      const img = await loadImageFromFile(file);
      let { width, height } = img;
      const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
      width = Math.max(1, Math.round(width * ratio));
      height = Math.max(1, Math.round(height * ratio));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);

      let output = canvas.toDataURL(mimeType, quality);
      if (output.length > 900000) output = canvas.toDataURL(mimeType, 0.68);
      if (output.length > 700000) {
        const canvas2 = document.createElement('canvas');
        canvas2.width = Math.max(1, Math.round(width * 0.88));
        canvas2.height = Math.max(1, Math.round(height * 0.88));
        const ctx2 = canvas2.getContext('2d', { alpha: false });
        ctx2.fillStyle = '#ffffff';
        ctx2.fillRect(0, 0, canvas2.width, canvas2.height);
        ctx2.drawImage(canvas, 0, 0, canvas2.width, canvas2.height);
        output = canvas2.toDataURL(mimeType, 0.62);
      }
      return output;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }

    function normalizeInstagram(url) {
      const safe = String(url || '').trim();
      if (!safe) return '';
      return /^(https?:)?\/\//i.test(safe) ? safe : `https://${safe}`;
    }

    function buildDeployHtml(data) {
      const safeName = escapeHtml(data.name || '');
      const safeSummary = escapeHtml(data.summary || '');
      const safeBirth = escapeHtml(data.birth || '');
      const safeEducation = escapeHtml(data.education || '');
      const safeBlood = escapeHtml(data.blood || '');
      const safeMbti = escapeHtml(data.mbti || '');
      const safeInstagramText = escapeHtml(data.instagram || '');
      const safeInstagramHref = normalizeInstagram(data.instagram || '');
      const safePhoto = data.photo || PLACEHOLDER;
      const instagramMarkup = safeInstagramText ? `<a href="${safeInstagramHref}" target="_blank" rel="noopener noreferrer">${safeInstagramText}</a>` : '';

      return `<!DOCTYPE html>

          <div class="info-item"><div class="label">혈액형</div><div class="value">${safeBlood}</div></div>
          <div class="info-item"><div class="label">MBTI</div><div class="value">${safeMbti}</div></div>
          <div class="info-item"><div class="label">Instagram</div><div class="value link">${instagramMarkup}</div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>`;
    }

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function render() {
      el.photoImage.src = state.photo || PLACEHOLDER;
      el.nameText.textContent = state.name || '';
      el.summaryText.textContent = state.summary || '';
      el.birthText.textContent = state.birth || '';
      el.educationText.textContent = state.education || '';
      el.bloodText.textContent = state.blood || '';
      el.mbtiText.textContent = state.mbti || '';

      if (state.instagram) {
        const safe = String(state.instagram).trim();
        const href = normalizeInstagram(safe);
        el.instagramText.innerHTML = `<a href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml(safe)}</a>`;
      } else {
        el.instagramText.textContent = '';
      }
    }

    function fillEditor() {
      el.nameInput.value = state.name || '';
      el.summaryInput.value = state.summary || '';
      el.birthInput.value = state.birth || '';
      el.educationInput.value = state.education || '';
      el.bloodInput.value = state.blood || '';
      el.mbtiInput.value = state.mbti || '';
      el.instagramInput.value = state.instagram || '';
      el.mainPhotoInput.value = '';
      setStatus('');
    }

    async function init() {
      try {
        db = await openDatabase();
        const saved = await dbGetState();
        state = saved ? { ...defaultState, ...saved } : { ...defaultState };
        if (!state.photo && Array.isArray(state.photos) && state.photos.length) {
          state.photo = state.photos[0];
        }
      } catch (e) {
        state = { ...defaultState };
      }
      render();
    }

    document.addEventListener('click', (e) => {
      if (!el.menuWrap.contains(e.target)) {
        el.menuWrap.removeAttribute('open');
      }
    });

    el.editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      el.menuWrap.removeAttribute('open');
      fillEditor();
      el.editorModal.classList.add('active');
    });

    el.exportBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      el.menuWrap.removeAttribute('open');
      const html = buildDeployHtml(state);
      const baseName = (state.name || 'profile').trim().replace(/[\\/:*?"<>|\s]+/g, '-').replace(/^-+|-+$/g, '') || 'profile';
      downloadTextFile(`${baseName}-deploy.html`, html);
      setStatus('배포용 HTML을 저장했습니다.', 'success');
      alert('배포용 HTML이 저장되었습니다.');
    });

    el.closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      el.editorModal.classList.remove('active');
      setStatus('');
    });

    el.editorModal.addEventListener('click', (e) => {
      if (e.target === el.editorModal) {
        el.editorModal.classList.remove('active');
        setStatus('');
      }
    });

    el.mainPhotoInput.addEventListener('change', () => setStatus(''));

    el.saveBtn.addEventListener('click', async () => {
      const name = el.nameInput.value.trim();
      if (!name) {
        setStatus('이름을 입력해 주세요.', 'error');
        return;
      }

      try {
        const nextState = {
          name,
          summary: el.summaryInput.value.trim(),
          birth: el.birthInput.value.trim(),
          education: el.educationInput.value.trim(),
          blood: el.bloodInput.value.trim(),
          mbti: el.mbtiInput.value.trim(),
          instagram: el.instagramInput.value.trim(),
          photo: state.photo || PLACEHOLDER
        };

        if (el.mainPhotoInput.files[0]) {
          nextState.photo = await compressImageFile(el.mainPhotoInput.files[0], {
            maxWidth: 1100,
            maxHeight: 1500,
            quality: 0.78
          });
        }

        state = nextState;
        await dbSaveState();
        render();
        el.editorModal.classList.remove('active');
        setStatus('');
      } catch (e) {
        setStatus('저장하지 못했습니다. 다시 시도해 주세요.', 'error');
      }
    });

    init();
  </script>
</body>
</html>
