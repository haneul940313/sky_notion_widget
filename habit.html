<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Check</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper-bg: #fbfbf8;
      --line-color: rgba(132, 184, 196, 0.48);
      --margin-line: rgba(208, 112, 112, 0.45);
      --text: #2f2f2f;
      --muted: #7a7a7a;
      --sat: #5d86c8;
      --sun: #d06f6f;
      --accent: #5d86c8;

      --row-h: 28px;
      --date-col: 56px;
      --margin-x: 64px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    body { width: 100%; }

    .widget {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 12px 8px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,0.05);
      background: var(--paper-bg);
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      padding-bottom: 6px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .month-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      margin: 0 2px;
    }

    .user-block {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      min-width: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #3f3f3f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .icon-btn, .text-btn, .menu-btn {
      border: none;
      background: transparent;
      color: #222;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .icon-btn {
      width: 22px;
      height: 22px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .text-btn {
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      border-radius: 8px;
      background: rgba(255,255,255,0.65);
    }

    .menu-btn {
      width: 18px;
      height: 18px;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover, .text-btn:hover, .menu-btn:hover {
      transform: translateY(-1px);
      opacity: 0.75;
    }

    /* ── TAB ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }

    .tab-btn {
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .tab-btn.active {
      background: rgba(93,134,200,0.12);
      color: var(--accent);
    }

    /* ── LOGIN ── */
    .login-box {
      display: none;
      margin-bottom: 6px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .login-box.show { display: block; }

    .guide {
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .login-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .input {
      width: 100%;
      height: 32px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.92);
    }

    .input:focus { border-color: rgba(0,0,0,0.18); }

    .status {
      min-height: 16px;
      margin: 4px 2px 0;
      font-size: 11px;
      color: #666;
    }

    /* ── SHEET (노트 배경) ── */
    .sheet {
      border-radius: 10px;
      background:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) - 1px),
          var(--margin-line) calc(var(--margin-x) + 1px),
          transparent calc(var(--margin-x) + 1px),
          transparent 100%
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--line-color) calc(var(--row-h) - 1px),
          var(--line-color) var(--row-h)
        );
    }

    /* ── HABIT HEADER ROW ── */
    .habit-header {
      display: grid;
      align-items: center;
      height: var(--row-h);
      padding: 0 0 0 var(--margin-x);
      gap: 0;
    }

    .habit-header-cell {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 2px;
    }

    /* ── CHECK ROW ── */
    .row {
      display: grid;
      align-items: center;
      height: var(--row-h);
      min-height: var(--row-h);
      max-height: var(--row-h);
    }

    .day-cell {
      height: var(--row-h);
      width: var(--date-col);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #666;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .day-cell.sat { color: var(--sat); }
    .day-cell.sun { color: var(--sun); }

    .checks-cell {
      display: flex;
      align-items: center;
      height: var(--row-h);
      padding: 0 6px;
      gap: 0;
      flex: 1;
      min-width: 0;
    }

    .check-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .check-wrap input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .check-wrap input[type="checkbox"]:disabled {
      cursor: default;
      opacity: 0.35;
    }

    .total-cell {
      width: 32px;
      height: var(--row-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── HABIT SETUP (설정 탭) ── */
    .habit-setup {
      padding: 6px 0;
    }

    .habit-setup-row {
      display: grid;
      grid-template-columns: var(--date-col) 1fr;
      align-items: center;
      height: var(--row-h);
    }

    .habit-num {
      height: var(--row-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .habit-input-wrap {
      display: flex;
      align-items: center;
      height: var(--row-h);
      padding: 0 8px;
      position: relative;
    }

    .habit-name-input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 0;
      font-size: 12px;
      color: var(--text);
      line-height: 1;
    }

    .habit-name-input::placeholder {
      color: #bbb;
    }

    .habit-name-input:disabled {
      color: rgba(0,0,0,0.45);
      cursor: default;
    }

    .habit-save-btn {
      display: none;
      margin-top: 6px;
      margin-left: var(--date-col);
      height: 28px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .habit-save-btn:hover { opacity: 0.82; }
    .habit-save-btn.show { display: inline-block; }

    /* ── HOME 탭 ── */
    .graph-wrap {
      padding: 8px 4px 4px;
    }

    canvas#graphCanvas {
      width: 100%;
      display: block;
    }

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 2px;
      padding: 0 2px;
    }

    .week-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .week-arrow {
      border: none;
      background: transparent;
      color: #888;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: opacity 0.15s;
    }

    .week-arrow:hover { opacity: 0.6; }
    .week-arrow:disabled { opacity: 0.2; cursor: default; }

    /* ── MENU ── */
    .menu-wrap {
      position: relative;
      display: none;
    }

    .menu-wrap.show { display: block; }

    .menu-pop {
      display: none;
      position: absolute;
      top: 24px;
      right: 0;
      min-width: 88px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 6px;
      z-index: 20;
    }

    .menu-pop.show { display: block; }

    .menu-item {
      width: 100%;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 8px;
      text-align: left;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .menu-item:hover { background: #f5f5f5; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 4px;
      padding-top: 4px;
      font-size: 10px;
      color: #7c7c7c;
      text-align: right;
    }

    @media (max-width: 640px) {
      :root {
        --row-h: 26px;
        --date-col: 48px;
        --margin-x: 56px;
      }

      .widget { padding: 8px 10px 8px; border-radius: 14px; }
      .month-title { font-size: 16px; }
      .user-name { max-width: 96px; font-size: 12px; }
      .login-row { flex-direction: column; align-items: stretch; }
      .login-row .text-btn { width: 100%; }
    }
  </style>
</head>
<body>
<div class="widget">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <button class="icon-btn" id="prevBtn">‹</button>
      <div class="month-title" id="monthTitle">2026년 3월</div>
      <button class="icon-btn" id="nextBtn">›</button>
      <div class="user-block">
        <div class="user-name" id="userNameText">사용자</div>
        <div class="menu-wrap" id="menuWrap">
          <button class="menu-btn" id="menuBtn">⋯</button>
          <div class="menu-pop" id="menuPop">
            <button class="menu-item" id="logoutBtn">로그아웃</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <div class="guide">최초 1회만 입력하면 자동 로그인됩니다.</div>
    <div class="login-row">
      <input class="input" id="loginNameInput" type="text" placeholder="사용자 이름" maxlength="30" />
      <input class="input" id="loginPasswordInput" type="password" placeholder="비밀번호" maxlength="30" />
      <button class="text-btn" id="startBtn">시작하기</button>
    </div>
    <div class="status" id="loginStatus"></div>
  </div>

  <!-- TAB -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="home">홈</button>
    <button class="tab-btn" data-tab="habits">습관 설정</button>
    <button class="tab-btn" data-tab="check">전체 보기</button>
  </div>

  <!-- TAB: 홈 (그래프 + 이번주) -->
  <div id="tabHome">
    <div class="graph-wrap">
      <canvas id="graphCanvas" height="180"></canvas>
    </div>
    <div class="week-nav">
      <button class="week-arrow" id="weekPrevBtn">‹</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="week-arrow" id="weekNextBtn">›</button>
    </div>
    <div class="sheet" id="weekSheet"></div>
  </div>

  <!-- TAB: 습관 설정 -->
  <div id="tabHabits" style="display:none;">
    <div class="sheet">
      <div class="habit-setup" id="habitSetup"></div>
    </div>
    <button class="habit-save-btn show" id="habitSaveBtn">저장</button>
  </div>

  <!-- TAB: 전체 체크 -->
  <div id="tabCheck" style="display:none;">
    <div class="sheet" id="sheet"></div>
  </div>

  <div class="status" id="statusText"></div>
  <div class="footer">© Clonote</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby1PwZNi5iDw1k-Oh1fjVXO5XXQBX9xziLa5ZV0NG5sbgjxHpyppejqC8ucpQHWcN6O7g/exec';
const STORAGE_KEY      = 'habitcheck_token';
const STORAGE_USER_KEY = 'habitcheck_user';
const MAX_HABITS = 10;
const DEFAULT_HABITS = 5;

let currentDate   = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let currentUser   = null;
let currentToken  = localStorage.getItem(STORAGE_KEY) || '';
let currentHabits = [];     // 이번 달 습관 이름 배열 (최대 10)
let currentChecks = {};     // { day: [bool x 10] }
let activeTab     = 'home';
let habitChanged  = false;
let currentWeekOffset = 0; // 0 = 이번주, -1 = 지난주, ...

/* ── DOM ── */
const monthTitle      = document.getElementById('monthTitle');
const userNameText    = document.getElementById('userNameText');
const loginBox        = document.getElementById('loginBox');
const loginNameInput  = document.getElementById('loginNameInput');
const loginPasswordInput = document.getElementById('loginPasswordInput');
const startBtn        = document.getElementById('startBtn');
const loginStatus     = document.getElementById('loginStatus');
const prevBtn         = document.getElementById('prevBtn');
const nextBtn         = document.getElementById('nextBtn');
const sheetEl         = document.getElementById('sheet');
const weekSheetEl     = document.getElementById('weekSheet');
const weekLabel       = document.getElementById('weekLabel');
const weekPrevBtn     = document.getElementById('weekPrevBtn');
const weekNextBtn     = document.getElementById('weekNextBtn');
const habitSetupEl    = document.getElementById('habitSetup');
const habitSaveBtn    = document.getElementById('habitSaveBtn');
const statusText      = document.getElementById('statusText');
const menuWrap        = document.getElementById('menuWrap');
const menuBtn         = document.getElementById('menuBtn');
const menuPop         = document.getElementById('menuPop');
const logoutBtn       = document.getElementById('logoutBtn');
const graphCanvas     = document.getElementById('graphCanvas');

/* ── UTILS ── */
function getYear()  { return currentDate.getFullYear(); }
function getMonth() { return currentDate.getMonth() + 1; }
function getYearMonth() {
  return getYear() + '-' + String(getMonth()).padStart(2, '0');
}
function getLastDay() {
  return new Date(getYear(), getMonth(), 0).getDate();
}
function getWeekday(day) {
  return new Date(getYear(), getMonth() - 1, day).getDay();
}
function getDayClass(day) {
  const w = getWeekday(day);
  return w === 6 ? 'sat' : w === 0 ? 'sun' : '';
}
function setStatus(msg, isError = false) {
  statusText.textContent = msg || '';
  statusText.style.color = isError ? '#c0392b' : '#666';
}
function setLoginStatus(msg, isError = false) {
  loginStatus.textContent = msg || '';
  loginStatus.style.color = isError ? '#c0392b' : '#666';
}
function activeHabitCount() {
  return currentHabits.filter(h => h.trim() !== '').length || DEFAULT_HABITS;
}

/* ── API ── */
async function getJson(url) {
  const r = await fetch(url);
  return r.json();
}
async function postJson(body) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return r.json();
}

/* ── AUTH ── */
async function tryAutoLogin() {
  if (!currentToken) { renderLoginState(); return false; }
  try {
    const res = await getJson(`${API_URL}?action=autoLogin&token=${encodeURIComponent(currentToken)}`);
    if (res.success && res.user) {
      currentUser = res.user;
      localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(currentUser));
      renderLoginState();
      return true;
    }
    clearAuth();
    return false;
  } catch {
    renderLoginState();
    return false;
  }
}

function clearAuth() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_USER_KEY);
  currentToken = '';
  currentUser  = null;
}

async function start() {
  const userName = loginNameInput.value.trim();
  const password = loginPasswordInput.value.trim();
  if (!userName || !password) { setLoginStatus('이름과 비밀번호를 입력해 주세요.', true); return; }

  startBtn.disabled = true;
  setLoginStatus('확인 중입니다...');
  try {
    await postJson({ action: 'registerUser', userName, password });
    const res = await postJson({ action: 'login', userName, password });
    if (!res.success || !res.token || !res.user) throw new Error(res.message || '로그인 실패');

    currentToken = res.token;
    currentUser  = res.user;
    localStorage.setItem(STORAGE_KEY, currentToken);
    localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(currentUser));
    loginNameInput.value = '';
    loginPasswordInput.value = '';
    setLoginStatus('');
    renderLoginState();
    await loadAll();
  } catch (e) {
    setLoginStatus(e.message || '실패했습니다.', true);
  } finally {
    startBtn.disabled = false;
  }
}

async function logout() {
  try { if (currentToken) await postJson({ action: 'logout', token: currentToken }); } catch {}
  clearAuth();
  currentHabits = [];
  currentChecks = {};
  renderLoginState();
  renderSheet();
  renderHabitSetup();
  renderGraph();
  setStatus('로그아웃되었습니다.');
}

function renderLoginState() {
  monthTitle.textContent = getYear() + '년 ' + getMonth() + '월';
  userNameText.textContent = currentUser?.userName || '사용자';
  loginBox.classList.toggle('show', !currentUser);
  menuWrap.classList.toggle('show', !!currentUser);
  if (!currentUser) menuPop.classList.remove('show');
}

/* ── LOAD ── */
async function loadAll() {
  renderLoginState();
  if (!currentUser) return;

  try {
    const [hRes, cRes] = await Promise.all([
      getJson(`${API_URL}?action=getHabits&userId=${currentUser.userId}&yearMonth=${getYearMonth()}`),
      getJson(`${API_URL}?action=getChecks&userId=${currentUser.userId}&yearMonth=${getYearMonth()}`)
    ]);

    currentHabits = (hRes.success && hRes.habits) ? hRes.habits : Array(MAX_HABITS).fill('');
    currentChecks = {};
    if (cRes.success && cRes.checks) {
      cRes.checks.forEach(c => { currentChecks[c.day] = c.checks; });
    }
  } catch {
    currentHabits = Array(MAX_HABITS).fill('');
    currentChecks = {};
    setStatus('데이터를 불러오지 못했습니다.', true);
  }

  renderSheet();
  renderWeekSheet();
  renderHabitSetup();
  renderGraph();
  setStatus('');
}

/* ── WEEK SHEET ── */
function getWeekDays() {
  // 이번 달 기준 currentWeekOffset 주의 월~일 (해당 월 범위 내)
  const today = new Date();
  const isCurrentMonth = (getYear() === today.getFullYear() && getMonth() === today.getMonth() + 1);
  const baseDay = isCurrentMonth ? today.getDate() : getLastDay();

  // 이번주 월요일 기준
  const baseDate = new Date(getYear(), getMonth() - 1, baseDay);
  const dow = baseDate.getDay(); // 0=일,1=월,...
  const monday = new Date(baseDate);
  monday.setDate(baseDate.getDate() - (dow === 0 ? 6 : dow - 1) + currentWeekOffset * 7);

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d.getFullYear() === getYear() && d.getMonth() + 1 === getMonth()) {
      days.push(d.getDate());
    }
  }
  return days;
}

function renderWeekSheet() {
  const count = activeHabitCount();
  const names = currentHabits.slice(0, count);
  const days  = getWeekDays();
  const lastDay = getLastDay();

  // 주 레이블
  if (days.length > 0) {
    weekLabel.textContent = `${days[0]}일 — ${days[days.length - 1]}일`;
  } else {
    weekLabel.textContent = '해당 없음';
  }

  // 화살표 비활성화 조건
  const minDay = days.length > 0 ? days[0] : 1;
  const maxDay = days.length > 0 ? days[days.length - 1] : lastDay;
  weekPrevBtn.disabled = minDay <= 1;
  weekNextBtn.disabled = maxDay >= lastDay;

  if (days.length === 0) { weekSheetEl.innerHTML = ''; return; }

  let colTpl = `var(--date-col) repeat(${count}, 1fr) 32px`;

  // 헤더
  let html = `<div class="habit-header" style="grid-template-columns:${colTpl};">`;
  html += `<div></div>`;
  names.forEach(n => {
    html += `<div class="habit-header-cell">${escHtml(n || '—')}</div>`;
  });
  html += `<div class="habit-header-cell" style="color:var(--accent);">합</div>`;
  html += `</div>`;

  const DOW_LABELS = ['일','월','화','수','목','금','토'];
  days.forEach(day => {
    const w = getWeekday(day);
    const dowLabel = DOW_LABELS[w];
    const cls = w === 6 ? 'sat' : w === 0 ? 'sun' : '';
    const checks = currentChecks[day] || Array(MAX_HABITS).fill(false);
    const total = checks.slice(0, count).filter(Boolean).length;
    const disabled = currentUser ? '' : 'disabled';

    let checksHtml = '';
    for (let i = 0; i < count; i++) {
      const checked = checks[i] ? 'checked' : '';
      checksHtml += `<div class="check-wrap"><input type="checkbox" data-day="${day}" data-idx="${i}" data-source="week" ${checked} ${disabled}/></div>`;
    }

    html += `
      <div class="row" style="grid-template-columns:${colTpl};">
        <div class="day-cell ${cls}">${day}<span style="font-size:9px;font-weight:400;margin-left:1px;">${dowLabel}</span></div>
        ${checksHtml}
        <div class="total-cell" data-week-total-day="${day}">${total > 0 ? total : ''}</div>
      </div>`;
  });

  weekSheetEl.innerHTML = html;

  weekSheetEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', onCheckChange);
  });
}


function renderSheet() {
  const count = activeHabitCount();
  const names = currentHabits.slice(0, count);
  const lastDay = getLastDay();

  // 헤더
  let colTpl = `var(--date-col) repeat(${count}, 1fr) 32px`;
  let headerHtml = `<div class="habit-header" style="grid-template-columns:${colTpl};">`;
  headerHtml += `<div></div>`;
  names.forEach(n => {
    headerHtml += `<div class="habit-header-cell">${escHtml(n || '—')}</div>`;
  });
  headerHtml += `<div class="habit-header-cell" style="color:var(--accent);">합</div>`;
  headerHtml += `</div>`;

  // 날짜 행
  let rowsHtml = '';
  for (let day = 1; day <= lastDay; day++) {
    const cls = getDayClass(day);
    const checks = currentChecks[day] || Array(MAX_HABITS).fill(false);
    const total = checks.slice(0, count).filter(Boolean).length;
    const disabled = currentUser ? '' : 'disabled';

    let checksHtml = '';
    for (let i = 0; i < count; i++) {
      const checked = checks[i] ? 'checked' : '';
      checksHtml += `<div class="check-wrap"><input type="checkbox" data-day="${day}" data-idx="${i}" ${checked} ${disabled}/></div>`;
    }

    rowsHtml += `
      <div class="row" style="grid-template-columns:${colTpl};">
        <div class="day-cell ${cls}">${day}일</div>
        ${checksHtml}
        <div class="total-cell" data-total-day="${day}">${total > 0 ? total : ''}</div>
      </div>`;
  }

  sheetEl.innerHTML = headerHtml + rowsHtml;

  // 이벤트
  sheetEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', onCheckChange);
  });
}

async function onCheckChange(e) {
  if (!currentUser) return;
  const day  = Number(e.target.dataset.day);
  const idx  = Number(e.target.dataset.idx);
  const count = activeHabitCount();

  const prev = currentChecks[day] ? [...currentChecks[day]] : Array(MAX_HABITS).fill(false);
  prev[idx] = e.target.checked;
  currentChecks[day] = prev;

  // 합계 즉시 반영 (전체 시트 + 주간 시트 둘 다)
  const total = prev.slice(0, count).filter(Boolean).length;
  const totalEl = sheetEl.querySelector(`[data-total-day="${day}"]`);
  if (totalEl) totalEl.textContent = total > 0 ? total : '';
  const weekTotalEl = weekSheetEl.querySelector(`[data-week-total-day="${day}"]`);
  if (weekTotalEl) weekTotalEl.textContent = total > 0 ? total : '';

  // 체크 상태 동기화 (전체 시트 ↔ 주간 시트)
  const twin = e.target.dataset.source === 'week'
    ? sheetEl.querySelector(`input[data-day="${day}"][data-idx="${idx}"]`)
    : weekSheetEl.querySelector(`input[data-day="${day}"][data-idx="${idx}"]`);
  if (twin) twin.checked = e.target.checked;

  // 그래프 업데이트
  if (activeTab === 'home') renderGraph();

  try {
    await postJson({
      action: 'saveCheck',
      userId: currentUser.userId,
      yearMonth: getYearMonth(),
      day,
      checks: prev
    });
  } catch {
    setStatus('저장 중 오류가 발생했습니다.', true);
  }
}

/* ── HABIT SETUP ── */
function renderHabitSetup() {
  let html = '';
  for (let i = 0; i < MAX_HABITS; i++) {
    const val = escHtml(currentHabits[i] || '');
    const placeholder = i < DEFAULT_HABITS ? `습관 ${i + 1}` : `습관 ${i + 1} (선택)`;
    const disabled = currentUser ? '' : 'disabled';
    html += `
      <div class="habit-setup-row">
        <div class="habit-num">${i + 1}</div>
        <div class="habit-input-wrap">
          <input class="habit-name-input" type="text"
            data-habit-idx="${i}"
            value="${val}"
            placeholder="${placeholder}"
            maxlength="20"
            ${disabled}
          />
        </div>
      </div>`;
  }
  habitSetupEl.innerHTML = html;
  habitChanged = false;

  habitSetupEl.querySelectorAll('.habit-name-input').forEach(inp => {
    inp.addEventListener('input', () => { habitChanged = true; });
  });
}

async function saveHabits() {
  if (!currentUser) return;
  const inputs = habitSetupEl.querySelectorAll('.habit-name-input');
  const habits = Array.from(inputs).map(i => i.value.trim());

  habitSaveBtn.disabled = true;
  setStatus('저장 중...');
  try {
    const res = await postJson({
      action: 'saveHabits',
      userId: currentUser.userId,
      yearMonth: getYearMonth(),
      habits
    });
    if (!res.success) throw new Error(res.message);
    currentHabits = res.habits;
    habitChanged = false;
    renderSheet();
    renderWeekSheet();
    renderGraph();
    setStatus('습관이 저장되었습니다.');
  } catch (e) {
    setStatus(e.message || '저장 실패', true);
  } finally {
    habitSaveBtn.disabled = false;
  }
}

/* ── GRAPH ── */
function renderGraph() {
  const ctx = graphCanvas.getContext('2d');
  const lastDay = getLastDay();
  const count = activeHabitCount();
  const today = (getYear() === new Date().getFullYear() && getMonth() === new Date().getMonth() + 1)
    ? new Date().getDate() : lastDay;

  // 데이터: 하루 total 배열
  const data = [];
  for (let d = 1; d <= lastDay; d++) {
    const checks = currentChecks[d] || [];
    const total = checks.slice(0, count).filter(Boolean).length;
    data.push(total);
  }

  const dpr = window.devicePixelRatio || 1;
  const W = graphCanvas.parentElement.offsetWidth || 600;
  const H = 180;
  graphCanvas.width  = W * dpr;
  graphCanvas.height = H * dpr;
  graphCanvas.style.width  = W + 'px';
  graphCanvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const pad = { top: 16, right: 20, bottom: 28, left: 28 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // 격자
  ctx.strokeStyle = 'rgba(132,184,196,0.28)';
  ctx.lineWidth = 0.5;
  for (let v = 0; v <= count; v++) {
    const y = pad.top + gH - (v / count) * gH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + gW, y);
    ctx.stroke();
    if (v > 0 && v <= count) {
      ctx.fillStyle = 'rgba(100,100,100,0.45)';
      ctx.font = '9px Arial';
      ctx.textAlign = 'right';
      ctx.fillText(v, pad.left - 4, y + 3);
    }
  }

  // X축 날짜 레이블 (5일 간격)
  ctx.fillStyle = 'rgba(100,100,100,0.5)';
  ctx.font = '9px Arial';
  ctx.textAlign = 'center';
  for (let d = 1; d <= lastDay; d++) {
    if (d === 1 || d % 5 === 0 || d === lastDay) {
      const x = pad.left + ((d - 1) / (lastDay - 1)) * gW;
      ctx.fillText(d, x, H - pad.bottom + 12);
    }
  }

  // 오늘 이전 데이터 포인트
  const points = [];
  for (let d = 1; d <= today; d++) {
    const x = pad.left + ((d - 1) / (lastDay - 1)) * gW;
    const y = pad.top + gH - (data[d - 1] / count) * gH;
    points.push({ x, y, v: data[d - 1] });
  }

  if (points.length < 1) return;

  // 면 채우기
  ctx.beginPath();
  ctx.moveTo(points[0].x, pad.top + gH);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, pad.top + gH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(93,134,200,0.10)';
  ctx.fill();

  // 꺾은선
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(93,134,200,0.85)';
  ctx.lineWidth = 1.8;
  ctx.lineJoin = 'round';
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // 포인트 dot
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = p.v > 0 ? 'rgba(93,134,200,0.9)' : 'rgba(200,200,200,0.6)';
    ctx.fill();
  });
}

/* ── TABS ── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('tabHome').style.display   = tab === 'home'   ? '' : 'none';
  document.getElementById('tabHabits').style.display = tab === 'habits' ? '' : 'none';
  document.getElementById('tabCheck').style.display  = tab === 'check'  ? '' : 'none';

  if (tab === 'home') renderGraph();
}

/* ── MONTH NAV ── */
function moveMonth(offset) {
  currentDate = new Date(getYear(), getMonth() - 1 + offset, 1);
  currentWeekOffset = 0;
  currentHabits = [];
  currentChecks = {};
  renderSheet();
  renderWeekSheet();
  renderHabitSetup();
  renderGraph();
  loadAll();
}

/* ── MISC ── */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── EVENTS ── */
prevBtn.addEventListener('click', () => moveMonth(-1));
nextBtn.addEventListener('click', () => moveMonth(1));
startBtn.addEventListener('click', start);
logoutBtn.addEventListener('click', logout);
habitSaveBtn.addEventListener('click', saveHabits);
loginNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') start(); });
loginPasswordInput.addEventListener('keydown', e => { if (e.key === 'Enter') start(); });
menuBtn.addEventListener('click', () => menuPop.classList.toggle('show'));
document.addEventListener('click', e => { if (!menuWrap.contains(e.target)) menuPop.classList.remove('show'); });
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
window.addEventListener('resize', () => { if (activeTab === 'home') renderGraph(); });

weekPrevBtn.addEventListener('click', () => {
  currentWeekOffset--;
  renderWeekSheet();
});
weekNextBtn.addEventListener('click', () => {
  currentWeekOffset++;
  renderWeekSheet();
});

/* ── INIT ── */
async function init() {
  renderLoginState();
  renderSheet();
  renderWeekSheet();
  renderHabitSetup();
  renderGraph();

  const cachedUser = (() => {
    try { const r = localStorage.getItem(STORAGE_USER_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
  })();

  if (currentToken && cachedUser) {
    currentUser = cachedUser;
    renderLoginState();
    await loadAll();
    const ok = await tryAutoLogin();
    if (!ok) { clearAuth(); renderLoginState(); renderSheet(); setStatus('로그인이 만료되었습니다.', true); }
    else await loadAll();
    return;
  }

  const ok = await tryAutoLogin();
  if (ok) await loadAll();
}

init();
</script>
