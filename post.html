<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>작품 위젯</title>

<style>
body{
  font-family:sans-serif;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,150px);
  gap:12px;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.info{
  padding:8px;
}

.title{
  font-weight:700;
  font-size:14px;
}

.meta{
  font-size:12px;
  color:#666;
}
</style>

</head>

<body>

<div class="grid" id="list"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzABOQXlt5gGURioDmQkOj3zMsnbJzaKcKlxlusHB3tfAiKfenk_rvro1e8Ojg0uRFL/exec";

async function loadData(){

const res = await fetch(API);
const data = await res.json();

const list = document.getElementById("list");

list.innerHTML = data.map(item=>`
<div class="card">

<img src="${item.poster || ''}">

<div class="info">
<div class="title">${item.title}</div>
<div class="meta">${item.year} · ${item.platform}</div>
<div class="meta">${item.role}</div>
</div>

</div>
`).join("");

}

loadData();

</script>

</body>
</html>
