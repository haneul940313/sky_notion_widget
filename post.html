<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Google Sheet API 데이터 가져오기</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .item { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    img { max-width: 200px; display: block; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Sheet 데이터</h1>
  <div id="list">로딩 중...</div>

  <script>
    const apiUrl = "https://script.google.com/macros/s/AKfycbw6l1DITu9bylCL_PfTsPYy1yBaa4OZ69luF6Pb_zAM0nAi6bnr0yqaPDfujS6x9pU/exec";

    async function fetchData() {
      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error("API 호출 실패: " + res.status);
        const data = await res.json();

        const listDiv = document.getElementById("list");
        if (data.length === 0) {
          listDiv.innerHTML = "데이터가 없습니다.";
          return;
        }

        listDiv.innerHTML = ""; // 기존 로딩 텍스트 제거

        data.forEach(item => {
          const div = document.createElement("div");
          div.className = "item";

          div.innerHTML = `
            <strong>${item.title} (${item.year})</strong><br>
            역할: ${item.role}<br>
            플랫폼: ${item.platform}<br>
            설명: ${item.desc}<br>
            <img src="${item.poster}" alt="${item.title}">
            ${item.extras.map(url => `<img src="${url}" alt="추가 이미지">`).join('')}
          `;

          listDiv.appendChild(div);
        });
      } catch (err) {
        document.getElementById("list").innerHTML = "오류 발생: " + err.message;
        console.error(err);
      }
    }

    fetchData();
  </script>
</body>
</html>
