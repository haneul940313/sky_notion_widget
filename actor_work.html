<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배우 작품활동 위젯</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111;
      background: #fff;
    }
    button, input, textarea { font: inherit; }
    .wrap {
      width: 100%;
      margin: 0;
      padding: 8px 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin: 0 0 14px;
      padding-right: 8px;
    }
    .title-box h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      text-align: left;
    }
    .title-box p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #666;
      text-align: left;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .btn {
      height: 38px;
      padding: 0 14px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }
    .btn.dark {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .btn.small {
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }
    .admin-tools {
      display: none;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .admin-tools.active { display: flex; }
    .card {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .form-card {
      display: none;
      margin-bottom: 14px;
    }
    .form-card.active { display: block; }
    .form-title {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field { margin-bottom: 10px; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #444;
    }
    .input, .textarea {
      width: 100%;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      background: #fff;
      outline: none;
    }
    .input {
      height: 38px;
      padding: 0 12px;
    }
    .textarea {
      min-height: 100px;
      padding: 10px 12px;
      resize: vertical;
    }
    .hint {
      margin-top: 5px;
      font-size: 11px;
      color: #777;
      line-height: 1.4;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .status-line {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      color: #777;
    }
    .status-line.error { color: #c62828; }
    .gallery-section {
      position: relative;
      width: 100%;
    }
    .gallery-nav {
      position: absolute;
      top: 38%;
      transform: translateY(-50%);
      z-index: 3;
      width: 28px;
      height: 48px;
      border: 0;
      background: rgba(255,255,255,0.96);
      color: #111;
      font-size: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .gallery-nav.show { display: inline-flex; }
    .gallery-prev { left: 0; border-radius: 0 10px 10px 0; }
    .gallery-next { right: 0; border-radius: 10px 0 0 10px; }
    .gallery-viewport {
      overflow: hidden;
      width: 100%;
      cursor: grab;
      touch-action: pan-y;
    }
    .gallery-viewport.dragging { cursor: grabbing; }
    .gallery-track {
      display: flex;
      gap: 10px;
      will-change: transform;
      transition: transform .28s ease;
      user-select: none;
    }
    .gallery-track.dragging { transition: none; }
    .poster-card {
      position: relative;
      flex: 0 0 calc((100% - 50px) / 6);
      min-width: 0;
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      transition: transform .15s ease;
    }
    .poster-card:hover { transform: translateY(-2px); }
    .poster-img-wrap {
      aspect-ratio: 2.2 / 3;
      background: #ececf1;
      overflow: hidden;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .poster-info { padding: 8px; }
    .poster-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .poster-meta {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .delete-box {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      display: none;
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.14);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: #111;
      padding: 0;
    }
    .delete-box::after {
      content: '삭제';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17,17,17,0.88);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 5px 7px;
      border-radius: 999px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    .delete-box:hover::after { opacity: 1; }
    .poster-card.admin .delete-box { display: inline-flex; }
    .empty {
      padding: 30px 14px;
      text-align: center;
      font-size: 13px;
      color: #777;
      border: 1px dashed #d9d9de;
      border-radius: 16px;
      background: #fff;
    }
    .modal, .pin-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0,0,0,0.45);
      z-index: 50;
    }
    .modal.active, .pin-modal.active { display: flex; }
    .modal-box {
      width: min(760px, 100%);
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    .modal-inner {
      display: grid;
      grid-template-columns: 260px 1fr;
    }
    .modal-poster {
      background: #ececf1;
      min-height: 380px;
      position: relative;
    }
    .modal-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 2;
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    }
    .image-nav-btn.show { display: inline-flex; }
    .image-nav-prev { left: 10px; }
    .image-nav-next { right: 10px; }
    .image-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17,17,17,0.7);
      color: #fff;
      font-size: 11px;
      display: none;
      z-index: 2;
    }
    .image-count.show { display: inline-flex; }
    .modal-content { padding: 18px; }
    .modal-content h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }
    .meta-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #444;
    }
    .desc {
      font-size: 14px;
      line-height: 1.7;
      color: #222;
      white-space: pre-wrap;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .work-nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      z-index: 60;
      cursor: pointer;
      width: 28px;
      height: 44px;
      padding: 0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.65);
    }
    .work-nav-btn::after {
      content: attr(data-label);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(17,17,17,0.88);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 7px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
      white-space: nowrap;
    }
    .work-nav-btn:hover::after { opacity: 1; }
    .work-nav-btn.show { display: inline-flex; }
    .work-nav-prev { left: max(14px, calc(50% - 430px)); }
    .work-nav-prev::after { left: 24px; }
    .work-nav-next { right: max(14px, calc(50% - 430px)); }
    .work-nav-next::after { right: 24px; }
    .pin-box {
      width: min(340px, 100%);
      background: #fff;
      border-radius: 16px;
      padding: 18px;
    }
    .pin-box h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .pin-box p {
      margin: 0 0 12px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    .pin-row {
      display: flex;
      gap: 8px;
    }
    .pin-input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #d9d9de;
      border-radius: 10px;
      outline: none;
      letter-spacing: 4px;
      text-align: center;
      font-size: 18px;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #d11a2a;
      min-height: 16px;
    }
    @media (max-width: 980px) {
      .poster-card { flex: 0 0 calc((100% - 20px) / 3); }
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .poster-card { flex: 0 0 calc((100% - 10px) / 2); }
      .modal-inner { grid-template-columns: 1fr; }
      .modal-poster { min-height: auto; aspect-ratio: 2.2 / 3; }
      .work-nav-btn { font-size: 28px; width: 24px; height: 36px; }
      .work-nav-prev { left: 8px; }
      .work-nav-next { right: 8px; }
      .work-nav-prev::after,
      .work-nav-next::after { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-box">
        <h1>배우 작품활동</h1>
        <p>포스터를 누르면 작품 상세 정보가 열립니다.</p>
      </div>
      <div class="toolbar">
        <button id="connectDriveBtn" class="btn dark" type="button">구글 드라이브 연결</button>
        <button id="adminBtn" class="btn" type="button">관리자</button>
      </div>
    </div>

    <div id="adminTools" class="admin-tools">
      <button id="openAddBtn" class="btn dark" type="button">작품 추가</button>
      <button id="adminOffBtn" class="btn" type="button">관리자 모드 종료</button>
    </div>

    <div id="formCard" class="card form-card">
      <h2 id="formTitle" class="form-title">작품 추가</h2>
      <div class="grid">
        <div class="field">
          <label for="workTitle">작품명</label>
          <input id="workTitle" class="input" type="text" placeholder="예: 드라마 제목" />
        </div>
        <div class="field">
          <label for="workYear">공개일 / 연도</label>
          <input id="workYear" class="input" type="text" placeholder="예: 2026.03 / 2025" />
        </div>
        <div class="field">
          <label for="workRole">역할</label>
          <input id="workRole" class="input" type="text" placeholder="예: 주연 / 특별출연" />
        </div>
        <div class="field">
          <label for="workPlatform">플랫폼 / 구분</label>
          <input id="workPlatform" class="input" type="text" placeholder="예: 드라마 / 영화 / OTT" />
        </div>
        <div class="field full">
          <label for="workPosterFile">대표 포스터 업로드</label>
          <input id="workPosterFile" class="input" type="file" accept="image/*" />
          <div class="hint">대표 포스터 1장을 업로드합니다.</div>
        </div>
        <div class="field full">
          <label for="workExtraFiles">추가 이미지 업로드</label>
          <input id="workExtraFiles" class="input" type="file" accept="image/*" multiple />
          <div class="hint">추가 이미지는 최대 3장까지 권장합니다.</div>
        </div>
        <div class="field full">
          <label for="workDesc">설명</label>
          <textarea id="workDesc" class="textarea" placeholder="작품 소개, 배역, 메모 등을 적어 주세요."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button id="saveBtn" class="btn dark" type="button">저장</button>
        <button id="cancelBtn" class="btn" type="button">취소</button>
      </div>
      <div id="formStatus" class="status-line"></div>
    </div>

    <div class="gallery-section">
      <button id="galleryPrevBtn" class="gallery-nav gallery-prev" type="button">‹</button>
      <div id="galleryViewport" class="gallery-viewport">
        <div id="galleryTrack" class="gallery-track"></div>
      </div>
      <button id="galleryNextBtn" class="gallery-nav gallery-next" type="button">›</button>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <button id="workPrevBtn" class="work-nav-btn work-nav-prev" data-label="이전" type="button">‹</button>
    <div class="modal-box">
      <div class="modal-inner">
        <div class="modal-poster">
          <button id="imagePrevBtn" class="image-nav-btn image-nav-prev" type="button">‹</button>
          <img id="detailImg" src="" alt="포스터" />
          <button id="imageNextBtn" class="image-nav-btn image-nav-next" type="button">›</button>
          <div id="imageCount" class="image-count"></div>
        </div>
        <div class="modal-content">
          <h2 id="detailTitle"></h2>
          <div class="meta-list">
            <div><strong>공개일</strong> <span id="detailYear"></span></div>
            <div><strong>역할</strong> <span id="detailRole"></span></div>
            <div><strong>플랫폼</strong> <span id="detailPlatform"></span></div>
          </div>
          <div id="detailDesc" class="desc"></div>
          <div id="detailActions" class="modal-actions"></div>
        </div>
      </div>
    </div>
    <button id="workNextBtn" class="work-nav-btn work-nav-next" data-label="다음" type="button">›</button>
  </div>

  <div id="pinModal" class="pin-modal">
    <div class="pin-box">
      <h3>관리자 PIN</h3>
      <p>4자리 코드를 입력하시면 작품 추가·수정·삭제가 가능합니다.</p>
      <div class="pin-row">
        <input id="pinInput" class="pin-input" type="password" maxlength="4" inputmode="numeric" placeholder="••••" />
        <button id="pinConfirmBtn" class="btn dark" type="button">확인</button>
      </div>
      <div id="pinStatus" class="status"></div>
    </div>
  </div>

  <script>
    /*
      아래 3가지는 반드시 Google Cloud 설정값으로 교체하세요.
      1) CLIENT_ID : OAuth 클라이언트 ID
      2) API_KEY   : 웹 API 키
      3) WIDGET_ID : 이 파일 전용 저장 공간 ID
    */
    const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
    const API_KEY = 'YOUR_GOOGLE_API_KEY';
    const WIDGET_ID = 'actor_widget_page_001';

    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
    const DATA_FILE_NAME = `actor_widget_data_${WIDGET_ID}.json`;
    const ADMIN_PIN = '0716';
    const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
        <rect width="400" height="600" fill="#ececf1"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#9a9aa3" font-size="24" font-family="sans-serif">NO IMAGE</text>
      </svg>
    `);

    const seedData = [{
      id: Date.now(),
      title: '샘플 작품',
      year: '2026',
      role: '주연',
      platform: '드라마',
      posterFileId: null,
      extraFileIds: [],
      desc: '여기에 작품 소개와 배역 관련 내용을 넣으면 됩니다.'
    }];

    const $ = (id) => document.getElementById(id);
    const ui = {
      connectDriveBtn: $('connectDriveBtn'), adminBtn: $('adminBtn'), adminTools: $('adminTools'), adminOffBtn: $('adminOffBtn'), openAddBtn: $('openAddBtn'),
      formCard: $('formCard'), formTitle: $('formTitle'), workTitle: $('workTitle'), workYear: $('workYear'), workRole: $('workRole'),
      workPlatform: $('workPlatform'), workPosterFile: $('workPosterFile'), workExtraFiles: $('workExtraFiles'), workDesc: $('workDesc'),
      saveBtn: $('saveBtn'), cancelBtn: $('cancelBtn'), galleryTrack: $('galleryTrack'), galleryViewport: $('galleryViewport'),
      galleryPrevBtn: $('galleryPrevBtn'), galleryNextBtn: $('galleryNextBtn'), detailModal: $('detailModal'), detailImg: $('detailImg'),
      detailTitle: $('detailTitle'), detailYear: $('detailYear'), detailRole: $('detailRole'), detailPlatform: $('detailPlatform'),
      detailDesc: $('detailDesc'), detailActions: $('detailActions'), imagePrevBtn: $('imagePrevBtn'), imageNextBtn: $('imageNextBtn'),
      imageCount: $('imageCount'), workPrevBtn: $('workPrevBtn'), workNextBtn: $('workNextBtn'), pinModal: $('pinModal'),
      pinInput: $('pinInput'), pinConfirmBtn: $('pinConfirmBtn'), pinStatus: $('pinStatus'), formStatus: $('formStatus')
    };

    let gapiInited = false;
    let gisInited = false;
    let tokenClient = null;
    let accessToken = null;
    let items = [];
    let isAdmin = false;
    let editingId = null;
    let currentDetailIndex = -1;
    let currentImageIndex = 0;
    let galleryIndex = 0;
    let cardsPerView = getCardsPerView();
    let startX = 0;
    let currentTranslate = 0;
    let prevTranslate = 0;
    let isDragging = false;
    let moved = false;
    let dataFileId = null;
    const imageUrlCache = new Map();

    function setFormStatus(text = '', isError = false) {
      ui.formStatus.textContent = text;
      ui.formStatus.classList.toggle('error', !!isError);
    }

    function getCardsPerView() {
      if (window.innerWidth <= 760) return 2;
      if (window.innerWidth <= 980) return 3;
      return 6;
    }

    function normalizeItems(list) {
      return (Array.isArray(list) ? list : []).map(item => ({
        id: item.id || Date.now(),
        title: item.title || '',
        year: item.year || '',
        role: item.role || '',
        platform: item.platform || '',
        posterFileId: item.posterFileId || null,
        extraFileIds: Array.isArray(item.extraFileIds) ? item.extraFileIds : [],
        desc: item.desc || ''
      }));
    }

    async function initializeGapi() {
      await new Promise((resolve) => gapi.load('client', resolve));
      await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
      gapiInited = true;
    }

    function initializeGis() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            setFormStatus('구글 드라이브 연결에 실패했습니다.', true);
            return;
          }
          accessToken = gapi.client.getToken()?.access_token || null;
          ui.connectDriveBtn.textContent = '드라이브 연결됨';
          setFormStatus('구글 드라이브 연결 완료');
          await loadRemoteState();
          renderGallery();
        }
      });
      gisInited = true;
    }

    async function ensureGoogleReady() {
      if (!gapiInited) await initializeGapi();
      if (!gisInited) initializeGis();
    }

    async function findDataFile() {
      const response = await gapi.client.drive.files.list({
        spaces: 'appDataFolder',
        q: `name='${DATA_FILE_NAME}' and trashed=false`,
        fields: 'files(id,name)'
      });
      return response.result.files?.[0] || null;
    }

    async function fetchJsonFile(fileId) {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) throw new Error('json fetch failed');
      return await res.json();
    }

    async function saveJsonFile(data) {
      const metadata = {
        name: DATA_FILE_NAME,
        parents: ['appDataFolder'],
        mimeType: 'application/json'
      };
      const boundary = '-------314159265358979323846';
      const delimiter = `\r\n--${boundary}\r\n`;
      const closeDelim = `\r\n--${boundary}--`;
      const body =
        delimiter +
        'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
        JSON.stringify(metadata) +
        delimiter +
        'Content-Type: application/json\r\n\r\n' +
        JSON.stringify(data) +
        closeDelim;

      const file = await findDataFile();
      const url = file
        ? `https://www.googleapis.com/upload/drive/v3/files/${file.id}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      const method = file ? 'PATCH' : 'POST';
      const res = await fetch(url, {
        method,
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': `multipart/related; boundary=${boundary}`
        },
        body
      });
      if (!res.ok) throw new Error('json save failed');
      const json = await res.json();
      dataFileId = json.id || file?.id || null;
      return json;
    }

    async function uploadDriveFile(file, existingId = null) {
      const metadata = { name: file.name, parents: ['appDataFolder'] };
      const boundary = '-------314159265358979323846';
      const delimiter = `\r\n--${boundary}\r\n`;
      const closeDelim = `\r\n--${boundary}--`;
      const fileData = await file.arrayBuffer();

      const encoder = new TextEncoder();
      const preamble = encoder.encode(
        delimiter +
        'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
        JSON.stringify(metadata) +
        delimiter +
        `Content-Type: ${file.type || 'application/octet-stream'}\r\n\r\n`
      );
      const ending = encoder.encode(closeDelim);

      const multipartBody = new Blob([preamble, fileData, ending], {
        type: `multipart/related; boundary=${boundary}`
      });

      const url = existingId
        ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      const method = existingId ? 'PATCH' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { Authorization: `Bearer ${accessToken}` },
        body: multipartBody
      });
      if (!res.ok) throw new Error('file upload failed');
      return await res.json();
    }

    async function deleteDriveFile(fileId) {
      if (!fileId) return;
      await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (imageUrlCache.has(fileId)) {
        URL.revokeObjectURL(imageUrlCache.get(fileId));
        imageUrlCache.delete(fileId);
      }
    }

    async function getDriveImageUrl(fileId) {
      if (!fileId) return PLACEHOLDER;
      if (imageUrlCache.has(fileId)) return imageUrlCache.get(fileId);
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) return PLACEHOLDER;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      imageUrlCache.set(fileId, url);
      return url;
    }

    async function loadRemoteState() {
      if (!accessToken) {
        items = normalizeItems(seedData);
        return;
      }
      const file = await findDataFile();
      if (!file) {
        items = normalizeItems(seedData);
        dataFileId = null;
        return;
      }
      dataFileId = file.id;
      const data = await fetchJsonFile(file.id);
      items = normalizeItems(data.items && data.items.length ? data.items : seedData);
      isAdmin = data.isAdmin === true;
      await setAdminMode(isAdmin, false);
    }

    async function saveRemoteState() {
      await saveJsonFile({ items, isAdmin, updatedAt: new Date().toISOString() });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    async function setAdminMode(value, persist = true) {
      isAdmin = !!value;
      ui.adminTools.classList.toggle('active', isAdmin);
      ui.adminBtn.textContent = isAdmin ? '관리자 모드 사용 중' : '관리자';
      if (!isAdmin) closeForm();
      if (persist && accessToken) await saveRemoteState();
      renderGallery();
    }

    function maxGalleryIndex() {
      return Math.max(0, items.length - cardsPerView);
    }

    function getCardStep() {
      const firstCard = ui.galleryTrack.querySelector('.poster-card');
      if (!firstCard) return 0;
      const style = window.getComputedStyle(ui.galleryTrack);
      const gap = parseFloat(style.gap || style.columnGap || 0) || 0;
      return firstCard.getBoundingClientRect().width + gap;
    }

    function updateGalleryPosition(animate = true) {
      const step = getCardStep();
      const translate = -(galleryIndex * step);
      ui.galleryTrack.classList.toggle('dragging', !animate);
      ui.galleryTrack.style.transform = `translateX(${translate}px)`;
      prevTranslate = translate;
      currentTranslate = translate;
      ui.galleryPrevBtn.classList.toggle('show', items.length > cardsPerView && galleryIndex > 0);
      ui.galleryNextBtn.classList.toggle('show', items.length > cardsPerView && galleryIndex < maxGalleryIndex());
    }

    function renderGallery() {
      cardsPerView = getCardsPerView();
      if (!items.length) {
        ui.galleryTrack.innerHTML = '<div class="empty">등록된 작품이 없습니다.</div>';
        ui.galleryPrevBtn.classList.remove('show');
        ui.galleryNextBtn.classList.remove('show');
        return;
      }

      ui.galleryTrack.innerHTML = items.map((item, index) => `
        <div class="poster-card ${isAdmin ? 'admin' : ''}" data-index="${index}">
          <button class="delete-box" type="button" data-id="${item.id}">×</button>
          <div class="poster-img-wrap">
            <img class="poster-img" data-poster-id="${item.posterFileId || ''}" src="${PLACEHOLDER}" alt="${(item.title || '').replace(/"/g, '&quot;')}" />
          </div>
          <div class="poster-info">
            <div class="poster-title">${escapeHtml(item.title)}</div>
            <div class="poster-meta">${escapeHtml(item.year || '')} · ${escapeHtml(item.platform || '')}</div>
          </div>
        </div>
      `).join('');

      ui.galleryTrack.querySelectorAll('.delete-box').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!accessToken) {
            setFormStatus('먼저 구글 드라이브를 연결해 주세요.', true);
            return;
          }
          const id = Number(btn.dataset.id);
          const target = items.find(item => item.id === id);
          const ok = window.confirm('이 작품을 삭제하시겠습니까?');
          if (!ok) return;
          try {
            if (target?.posterFileId) await deleteDriveFile(target.posterFileId);
            for (const fileId of (target?.extraFileIds || [])) await deleteDriveFile(fileId);
            items = items.filter(item => item.id !== id);
            await saveRemoteState();
            closeDetail();
            renderGallery();
            setFormStatus('작품을 삭제했습니다.');
          } catch (error) {
            setFormStatus('삭제하지 못했습니다. 다시 시도해 주세요.', true);
          }
        });
      });

      ui.galleryTrack.querySelectorAll('.poster-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (moved) return;
          if (e.target.closest('.delete-box')) return;
          const index = Number(card.dataset.index);
          if (!Number.isNaN(index)) openDetailByIndex(index);
        });
      });

      ui.galleryTrack.querySelectorAll('.poster-img').forEach(async (img) => {
        const fileId = img.dataset.posterId;
        img.src = await getDriveImageUrl(fileId);
      });

      if (galleryIndex > maxGalleryIndex()) galleryIndex = maxGalleryIndex();
      updateGalleryPosition(true);
    }

    async function updateDetailImage(item) {
      const ids = [item.posterFileId, ...(item.extraFileIds || [])].filter(Boolean);
      const fileId = ids[currentImageIndex] || null;
      ui.detailImg.src = fileId ? await getDriveImageUrl(fileId) : PLACEHOLDER;
      ui.imagePrevBtn.classList.toggle('show', ids.length > 1);
      ui.imageNextBtn.classList.toggle('show', ids.length > 1);
      ui.imageCount.classList.toggle('show', ids.length > 1);
      ui.imageCount.textContent = ids.length > 1 ? `${currentImageIndex + 1} / ${ids.length}` : '';
    }

    function updateWorkNavButtons() {
      const show = items.length > 1;
      ui.workPrevBtn.classList.toggle('show', show);
      ui.workNextBtn.classList.toggle('show', show);
    }

    async function openDetailByIndex(index) {
      if (!items.length) return;
      if (index < 0) index = items.length - 1;
      if (index >= items.length) index = 0;
      currentDetailIndex = index;
      currentImageIndex = 0;
      const item = items[index];

      ui.detailTitle.textContent = item.title || '';
      ui.detailYear.textContent = item.year || '-';
      ui.detailRole.textContent = item.role || '-';
      ui.detailPlatform.textContent = item.platform || '-';
      ui.detailDesc.textContent = item.desc || '';
      await updateDetailImage(item);
      updateWorkNavButtons();

      if (isAdmin) {
        ui.detailActions.innerHTML = `
          <button class="btn small dark" id="detailEditBtn" type="button">수정</button>
          <button class="btn small" id="detailCloseBtn" type="button">닫기</button>
        `;
        $('detailEditBtn').addEventListener('click', () => {
          closeDetail();
          openEdit(item.id);
        });
        $('detailCloseBtn').addEventListener('click', closeDetail);
      } else {
        ui.detailActions.innerHTML = `<button class="btn small" id="detailCloseBtn" type="button">닫기</button>`;
        $('detailCloseBtn').addEventListener('click', closeDetail);
      }

      ui.detailModal.classList.add('active');
    }

    function closeDetail() {
      ui.detailModal.classList.remove('active');
    }

    function resetForm() {
      editingId = null;
      ui.formTitle.textContent = '작품 추가';
      ui.workTitle.value = '';
      ui.workYear.value = '';
      ui.workRole.value = '';
      ui.workPlatform.value = '';
      ui.workPosterFile.value = '';
      ui.workExtraFiles.value = '';
      ui.workDesc.value = '';
      setFormStatus('');
    }

    function openAdd() {
      resetForm();
      ui.formCard.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openEdit(id) {
      const item = items.find(v => v.id === id);
      if (!item) return;
      editingId = id;
      ui.formTitle.textContent = '작품 수정';
      ui.workTitle.value = item.title || '';
      ui.workYear.value = item.year || '';
      ui.workRole.value = item.role || '';
      ui.workPlatform.value = item.platform || '';
      ui.workPosterFile.value = '';
      ui.workExtraFiles.value = '';
      ui.workDesc.value = item.desc || '';
      setFormStatus('기존 이미지는 새 파일을 올리지 않으면 유지됩니다.');
      ui.formCard.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeForm() {
      ui.formCard.classList.remove('active');
      resetForm();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveWork() {
      if (!accessToken) {
        setFormStatus('먼저 구글 드라이브를 연결해 주세요.', true);
        return;
      }
      const isEditing = !!editingId;
      const title = ui.workTitle.value.trim();
      if (!title) {
        setFormStatus('작품명을 입력해 주세요.', true);
        ui.workTitle.focus();
        return;
      }

      ui.saveBtn.disabled = true;
      setFormStatus('저장 중...');

      try {
        const existingItem = isEditing ? items.find(v => v.id === editingId) : null;
        let posterFileId = existingItem?.posterFileId || null;
        let extraFileIds = Array.isArray(existingItem?.extraFileIds) ? [...existingItem.extraFileIds] : [];

        const posterFile = ui.workPosterFile.files[0];
        const extraFiles = Array.from(ui.workExtraFiles.files || []).slice(0, 3);

        if (posterFile) {
          const uploaded = await uploadDriveFile(posterFile, posterFileId || null);
          posterFileId = uploaded.id;
        }

        if (extraFiles.length) {
          for (const oldId of extraFileIds) await deleteDriveFile(oldId);
          extraFileIds = [];
          for (const file of extraFiles) {
            const uploaded = await uploadDriveFile(file);
            extraFileIds.push(uploaded.id);
          }
        }

        const payload = {
          id: isEditing ? editingId : Date.now(),
          title,
          year: ui.workYear.value.trim(),
          role: ui.workRole.value.trim(),
          platform: ui.workPlatform.value.trim(),
          posterFileId,
          extraFileIds,
          desc: ui.workDesc.value.trim()
        };

        if (isEditing) items = items.map(v => v.id === editingId ? payload : v);
        else items.unshift(payload);

        await saveRemoteState();
        closeForm();
        renderGallery();
        setFormStatus('저장했습니다.');
      } catch (e) {
        setFormStatus('저장하지 못했습니다. Google Cloud 설정값과 Drive 연결 상태를 확인해 주세요.', true);
      } finally {
        ui.saveBtn.disabled = false;
      }
    }

    function pointerDown(x) {
      isDragging = true;
      moved = false;
      startX = x;
      ui.galleryViewport.classList.add('dragging');
      ui.galleryTrack.classList.add('dragging');
    }

    function pointerMove(x) {
      if (!isDragging) return;
      const diff = x - startX;
      if (Math.abs(diff) > 6) moved = true;
      currentTranslate = prevTranslate + diff;
      ui.galleryTrack.style.transform = `translateX(${currentTranslate}px)`;
    }

    function pointerUp() {
      if (!isDragging) return;
      isDragging = false;
      ui.galleryViewport.classList.remove('dragging');
      ui.galleryTrack.classList.remove('dragging');
      const movedBy = currentTranslate - prevTranslate;
      if (movedBy < -50 && galleryIndex < maxGalleryIndex()) galleryIndex += 1;
      if (movedBy > 50 && galleryIndex > 0) galleryIndex -= 1;
      updateGalleryPosition(true);
      setTimeout(() => { moved = false; }, 0);
    }

    ui.galleryPrevBtn.addEventListener('click', () => {
      if (galleryIndex > 0) {
        galleryIndex -= 1;
        updateGalleryPosition(true);
      }
    });

    ui.galleryNextBtn.addEventListener('click', () => {
      if (galleryIndex < maxGalleryIndex()) {
        galleryIndex += 1;
        updateGalleryPosition(true);
      }
    });

    ui.galleryViewport.addEventListener('mousedown', (e) => pointerDown(e.clientX));
    ui.galleryViewport.addEventListener('mousemove', (e) => pointerMove(e.clientX));
    ui.galleryViewport.addEventListener('mouseup', pointerUp);
    ui.galleryViewport.addEventListener('mouseleave', pointerUp);
    ui.galleryViewport.addEventListener('touchstart', (e) => pointerDown(e.touches[0].clientX), { passive: true });
    ui.galleryViewport.addEventListener('touchmove', (e) => pointerMove(e.touches[0].clientX), { passive: true });
    ui.galleryViewport.addEventListener('touchend', pointerUp);

    ui.connectDriveBtn.addEventListener('click', async () => {
      if (CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID' || API_KEY === 'YOUR_GOOGLE_API_KEY') {
        setFormStatus('CLIENT_ID와 API_KEY를 먼저 입력해 주세요.', true);
        return;
      }
      await ensureGoogleReady();
      tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
    });

    ui.adminBtn.addEventListener('click', () => {
      if (isAdmin) return;
      ui.pinInput.value = '';
      ui.pinStatus.textContent = '';
      ui.pinModal.classList.add('active');
      setTimeout(() => ui.pinInput.focus(), 50);
    });

    ui.pinConfirmBtn.addEventListener('click', async () => {
      if (ui.pinInput.value === ADMIN_PIN) {
        ui.pinModal.classList.remove('active');
        await setAdminMode(true);
      } else {
        ui.pinStatus.textContent = 'PIN이 올바르지 않습니다.';
      }
    });

    ui.pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') ui.pinConfirmBtn.click();
    });

    ui.adminOffBtn.addEventListener('click', async () => { await setAdminMode(false); });
    ui.openAddBtn.addEventListener('click', openAdd);
    ui.cancelBtn.addEventListener('click', closeForm);
    ui.saveBtn.addEventListener('click', saveWork);

    ui.imagePrevBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (currentDetailIndex < 0) return;
      const item = items[currentDetailIndex];
      const ids = [item.posterFileId, ...(item.extraFileIds || [])].filter(Boolean);
      currentImageIndex = (currentImageIndex - 1 + ids.length) % ids.length;
      await updateDetailImage(item);
    });

    ui.imageNextBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (currentDetailIndex < 0) return;
      const item = items[currentDetailIndex];
      const ids = [item.posterFileId, ...(item.extraFileIds || [])].filter(Boolean);
      currentImageIndex = (currentImageIndex + 1) % ids.length;
      await updateDetailImage(item);
    });

    ui.workPrevBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await openDetailByIndex(currentDetailIndex - 1);
    });

    ui.workNextBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await openDetailByIndex(currentDetailIndex + 1);
    });

    ui.detailModal.addEventListener('click', (e) => {
      if (e.target === ui.detailModal) closeDetail();
    });

    ui.pinModal.addEventListener('click', (e) => {
      if (e.target === ui.pinModal) ui.pinModal.classList.remove('active');
    });

    window.addEventListener('resize', () => {
      cardsPerView = getCardsPerView();
      if (galleryIndex > maxGalleryIndex()) galleryIndex = maxGalleryIndex();
      updateGalleryPosition(true);
    });

    items = normalizeItems(seedData);
    renderGallery();
    setFormStatus('구글 드라이브를 연결하면 저장/불러오기가 활성화됩니다.');
  </script>
</body>
</html>
