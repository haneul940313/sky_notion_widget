<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clonote</title>

<style>
body{margin:0;font-family:sans-serif;background:#fbfbf8}
.wrap{max-width:700px;margin:auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center}

.row{
  display:grid;
  grid-template-columns:60px 1fr 30px;
  height:24px;
  align-items:center;
}

input{width:100%;border:none;background:transparent;outline:none}
button{cursor:pointer}

.login{margin:10px 0}
.sat{color:#5d86c8}
.sun{color:#d06f6f}

.menu{position:relative}
.menu-box{
  display:none;
  position:absolute;
  right:0;
  top:30px;
  background:#fff;
  border:1px solid #ddd;
}
.menu-box.show{display:block}
</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <div>
    <button onclick="move(-1)">‹</button>
    <span id="month"></span>
    <button onclick="move(1)">›</button>
  </div>

  <div>
    <span id="user"></span>

    <div class="menu" id="menu" style="display:none">
      <button onclick="toggleMenu()">⋯</button>
      <div class="menu-box" id="menuBox">
        <button onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>
</div>

<div class="login" id="loginBox">
  <div>최초 1회만 입력하면 이후 자동 로그인됩니다.</div>
  <input id="name" placeholder="이름">
  <input id="pw" type="password" placeholder="비밀번호">
  <button onclick="start()">시작하기</button>
</div>

<div id="sheet"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwHN2xQr85KT3AWgJu388sRzEjYukyo7vb-vyNqre2j0UuJ0FXGAcn1FpBVX2SvzxBQwg/exec";

let token = localStorage.getItem("token");
let user = null;
let current = new Date();

function setMonth(){
  document.getElementById("month").innerText =
    current.getFullYear()+"년 "+(current.getMonth()+1)+"월";
}

function move(n){
  current.setMonth(current.getMonth()+n);
  load();
}

function lastDay(){
  return new Date(current.getFullYear(), current.getMonth()+1,0).getDate();
}

function dayClass(d){
  let w = new Date(current.getFullYear(), current.getMonth(), d).getDay();
  if(w===6) return "sat";
  if(w===0) return "sun";
  return "";
}

function render(records=[]){
  let map={};
  records.forEach(r=>map[r.day]=r.memo);

  let html="";
  for(let i=1;i<=lastDay();i++){
    html+=`
    <div class="row">
      <div class="${dayClass(i)}">${i}일</div>
      <input data-day="${i}" value="${map[i]||""}">
      <button onclick="save(${i})">✓</button>
    </div>`;
  }

  document.getElementById("sheet").innerHTML=html;
}

async function api(body){
  let r = await fetch(API,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  });
  return r.json();
}

async function get(url){
  let r = await fetch(API+"?"+url);
  return r.json();
}

/* 🔥 핵심 함수 */
async function start(){
  let userName = name.value.trim();
  let password = pw.value.trim();

  if(!userName || !password){
    alert("입력해");
    return;
  }

  // 1. 가입 시도
  let reg = await api({
    action:"registerUser",
    userName,
    password
  });

  // 2. 바로 로그인
  let login = await api({
    action:"login",
    userName,
    password
  });

  if(!login.success){
    alert("로그인 실패");
    return;
  }

  token = login.token;
  user = login.user;

  localStorage.setItem("token", token);

  initUI();
  load();
}

async function autoLogin(){
  if(!token) return false;

  let r = await get("action=autoLogin&token="+token);

  if(!r.success){
    localStorage.removeItem("token");
    return false;
  }

  user = r.user;
  return true;
}

async function logout(){
  await api({action:"logout",token});
  localStorage.removeItem("token");
  location.reload();
}

async function load(){
  if(!user) return;

  let r = await get(
    `action=getRecords&userId=${user.userId}&year=${current.getFullYear()}&month=${current.getMonth()+1}`
  );

  render(r.records);
}

async function save(day){
  let input = document.querySelector(`[data-day="${day}"]`);

  await api({
    action:"saveRecord",
    userId:user.userId,
    year:current.getFullYear(),
    month:current.getMonth()+1,
    day,
    memo:input.value
  });
}

function toggleMenu(){
  document.getElementById("menuBox").classList.toggle("show");
}

function initUI(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("menu").style.display="inline-block";
  document.getElementById("user").innerText=user.userName;
}

async function init(){
  setMonth();

  let ok = await autoLogin();
  if(ok){
    initUI();
    load();
  }
}

init();
</script>
</body>
</html>
