<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clonote</title>

<style>
body{margin:0;font-family:sans-serif;background:#fbfbf8}
.container{max-width:700px;margin:auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center}
.title{font-weight:700}
button{cursor:pointer}

.row{
  display:grid;
  grid-template-columns:60px 1fr 30px;
  height:24px;
  align-items:center;
}

input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}

.day{font-size:12px}
.sat{color:#5d86c8}
.sun{color:#d06f6f}

.login-box{margin:10px 0}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <button onclick="move(-1)">‹</button>
    <span id="month"></span>
    <button onclick="move(1)">›</button>
  </div>
  <div>
    <span id="user"></span>
    <button onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="login-box" id="loginBox">
  <input id="name" placeholder="이름">
  <input id="pw" placeholder="비밀번호" type="password">
  <button onclick="register()">회원가입</button>
  <button onclick="login()">로그인</button>
</div>

<div id="sheet"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwHN2xQr85KT3AWgJu388sRzEjYukyo7vb-vyNqre2j0UuJ0FXGAcn1FpBVX2SvzxBQwg/exec";

let token = localStorage.getItem("token");
let user = null;
let current = new Date();

function setMonth(){
  document.getElementById("month").innerText =
    current.getFullYear()+"년 "+(current.getMonth()+1)+"월";
}

function move(n){
  current.setMonth(current.getMonth()+n);
  load();
}

function getLastDay(){
  return new Date(current.getFullYear(), current.getMonth()+1,0).getDate();
}

function getDayClass(day){
  let d = new Date(current.getFullYear(), current.getMonth(), day).getDay();
  if(d===6) return "sat";
  if(d===0) return "sun";
  return "";
}

function render(records=[]){
  let map={};
  records.forEach(r=>map[r.day]=r.memo);

  let html="";
  for(let i=1;i<=getLastDay();i++){
    html+=`
    <div class="row">
      <div class="day ${getDayClass(i)}">${i}일</div>
      <input value="${map[i]||""}" data-day="${i}">
      <button onclick="save(${i},this)">✓</button>
    </div>
    `;
  }
  document.getElementById("sheet").innerHTML=html;
}

async function api(body){
  const res = await fetch(API,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  });
  return res.json();
}

async function get(url){
  const res = await fetch(API+"?"+url);
  return res.json();
}

async function register(){
  let userName=name.value.trim();
  let password=pw.value.trim();

  let r = await api({
    action:"registerUser",
    userName,
    password
  });

  if(r.mode==="existing"){
    alert("이미 있음");
    return;
  }

  alert("가입 완료");
}

async function login(){
  let r = await api({
    action:"login",
    userName:name.value,
    password:pw.value
  });

  if(!r.success){
    alert("로그인 실패");
    return;
  }

  token = r.token;
  localStorage.setItem("token",token);
  user = r.user;

  initUI();
  load();
}

async function autoLogin(){
  if(!token) return false;

  let r = await get("action=autoLogin&token="+token);

  if(!r.success){
    localStorage.removeItem("token");
    return false;
  }

  user = r.user;
  return true;
}

async function logout(){
  await api({action:"logout",token});
  localStorage.removeItem("token");
  location.reload();
}

async function load(){
  if(!user) return;

  let r = await get(
    `action=getRecords&userId=${user.userId}&year=${current.getFullYear()}&month=${current.getMonth()+1}`
  );

  render(r.records);
}

async function save(day,btn){
  let input = document.querySelector(`[data-day="${day}"]`);
  let memo = input.value;

  await api({
    action:"saveRecord",
    userId:user.userId,
    year:current.getFullYear(),
    month:current.getMonth()+1,
    day,
    memo
  });

  btn.style.color="black";
}

function initUI(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("user").innerText=user.userName;
}

async function init(){
  setMonth();

  let ok = await autoLogin();
  if(ok){
    initUI();
    load();
  }
}

init();
</script>

</body>
</html>
